<!DOCTYPE html>
<html lang="pt-BR" data-dark="0">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<meta name="theme-color" content="#007AFF" id="theme-color-meta">
<title>FocusFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var s=localStorage.getItem('ff-dark');
  var sys=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var dark=(s==='1')||(s===null&&sys);
  if(dark){document.documentElement.setAttribute('data-dark','1');document.documentElement.style.cssText='background-color:#000000;color-scheme:dark';}
})();
function updateThemeColor(){var meta=document.getElementById('theme-color-meta');if(!meta)return;var dark=document.documentElement.getAttribute('data-dark')==='1';meta.content=dark?'#1c1c1e':'#e8effa';}
updateThemeColor();
</script>
<style>
:root{--bg:transparent;--card:#FFFFFF;--card2:#F2F2F7;--fg:#000000;--sub:#8E8E93;--sep:rgba(0,0,0,.06);--line:rgba(0,0,0,.09);--shadow:rgba(0,0,0,.06);--blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;--purple:#AF52DE;--teal:#5AC8FA;--pink:#FF2D55;--yellow:#FFCC00;--chk:#C7C7CC;--nav-bg:rgba(255,255,255,.72);--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);}
[data-dark="1"]{--bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;--fg:#FFFFFF;--sub:#8E8E93;--sep:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--shadow:rgba(0,0,0,.3);--chk:#48484A;--nav-bg:rgba(28,28,30,.85);}
[data-dark="1"] body,[data-dark="1"] html{background-color:#000000!important}
[data-dark="1"] .pages,[data-dark="1"] *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;}
body{font-family:'Inter',-apple-system,sans-serif;background:transparent;color:var(--fg);-webkit-font-smoothing:antialiased;min-height:100vh;}
.pages{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;background:transparent}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding-bottom:88px;display:none;background:transparent;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.page.active{display:block}
@keyframes slideInR{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInL{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes sheetSpring{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bannerSlideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes chkBounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.82)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes toastSpring{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes lp-pulse{0%{box-shadow:0 0 0 0 rgba(0,122,255,.4)}70%{box-shadow:0 0 0 10px rgba(0,122,255,0)}100%{box-shadow:0 0 0 0 rgba(0,122,255,0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.page.anim-r{animation:slideInR .22s cubic-bezier(.25,1,.5,1)}
.page.anim-l{animation:slideInL .22s cubic-bezier(.25,1,.5,1)}
.page.anim-f{animation:fadeIn .18s ease}
.hdr{padding:12px 18px 8px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center}
.hdr-left small{display:none}
.hdr-act{display:flex;gap:2px;align-items:center;background:rgba(255,255,255,.7);backdrop-filter:blur(80px) saturate(4) brightness(1.14);-webkit-backdrop-filter:blur(80px) saturate(4) brightness(1.14);border:.5px solid rgba(255,255,255,.88);box-shadow:0 1.5px 0 rgba(255,255,255,.96) inset,0 4px 20px rgba(80,100,180,.12);border-radius:50px;padding:4px 6px;}
[data-dark="1"] .hdr-act{background:rgba(44,44,46,.88);border-color:rgba(255,255,255,.12);box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 4px 16px rgba(0,0,0,.35)}
.hdr-btn{border:none;background:transparent;cursor:pointer;padding:0;width:38px;height:38px;border-radius:50px;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--sub)}
.hdr-btn:active{background:var(--sep)}
.week-wrap{display:flex;align-items:center;padding:14px 14px 10px;gap:0}
.w-arr{border:none;background:transparent;cursor:pointer;color:var(--sub);font-size:24px;padding:2px 6px;line-height:1;flex-shrink:0}
.wdays{flex:1;display:flex;justify-content:space-between}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 2px 2px;border-radius:10px;min-width:0}
.wday-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.2px;font-weight:400}
.wday-n{font-size:15px;font-weight:300;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--fg)}
.wday.is-today .wday-n{background:#e03120;color:#fff;font-weight:500}
.wday.is-sel:not(.is-today) .wday-n{background:rgba(0,122,255,.10);color:var(--blue)}
.wday-dot{width:4px;height:4px;border-radius:50%;background:var(--sub);opacity:.4}
.week-divider{height:.5px;background:linear-gradient(90deg,transparent 0%,rgba(150,185,230,.45) 20%,rgba(150,185,230,.45) 80%,transparent 100%);margin:0 20px 4px;flex-shrink:0}
.sec{padding:16px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:12px;color:var(--sub);font-weight:600;letter-spacing:.3px}
.sec-t b{color:var(--fg);font-weight:700;font-size:13px}
.sec-act{border:none;background:rgba(0,0,0,.04);color:#6e6e73;font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:600;padding:4px 10px;border-radius:8px}
.card{background:rgba(255,255,255,.96);border-radius:18px;margin:0 16px 4px;overflow:hidden;border:.5px solid rgba(180,210,255,.25);box-shadow:0 1px 0 rgba(255,255,255,1) inset,0 2px 10px rgba(80,140,255,.06),0 6px 20px rgba(60,100,220,.05)}
[data-dark="1"] .card{background:var(--card);border-color:rgba(255,255,255,.06)}
.irow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:.5px solid rgba(0,0,0,.05);cursor:pointer;transition:background .1s;position:relative;overflow:hidden;background:transparent;touch-action:pan-y;min-height:52px}
.irow:last-child{border-bottom:none!important}
.irow:active{background:rgba(0,122,255,.06)!important}
.irow .swipe-bg-l,.irow .swipe-bg-r{position:absolute;top:0;bottom:0;width:100%;display:flex;align-items:center;padding:0 22px;font-size:13px;font-weight:700;color:#fff;pointer-events:none;opacity:0;transition:opacity .12s}
.irow .swipe-bg-r{background:var(--green);justify-content:flex-start;left:0}
.irow .swipe-bg-l{background:var(--red);justify-content:flex-end;right:0}
@keyframes checkBounce{0%{transform:scale(1)}35%{transform:scale(1.35)}65%{transform:scale(.88)}100%{transform:scale(1)}}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s cubic-bezier(.25,1,.5,1);background:transparent}
.chk.done{background:#34C759;border-color:#34C759;box-shadow:0 2px 8px rgba(52,199,89,.35);animation:chkBounce .4s cubic-bezier(.25,1,.5,1)}
.chk.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.ibody{min-width:0;flex:1}
.ititle{font-size:15px;font-weight:400;line-height:1.35;color:var(--fg);letter-spacing:-.1px}
.ititle.done{color:var(--sub);text-decoration:line-through}
.inotes{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.imeta{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;align-items:center;font-size:12px;color:var(--sub)}
.idate{font-size:12px;color:var(--sub)}
.idate.late{color:var(--red)}
.idate.today-c{color:var(--blue)}
.drag-handle{width:18px;color:var(--chk);cursor:grab;flex-shrink:0;font-size:14px;text-align:center;opacity:.4;touch-action:none}
.dragging{opacity:.35}
.drag-over{border-top:2px solid var(--blue)}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px}
.tag-sel-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px}
.tag-opt{font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1.5px solid rgba(0,0,0,.1);cursor:pointer;transition:all .15s;background:rgba(255,255,255,.6);color:var(--fg)}
[data-dark="1"] .tag-opt{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.tag-opt.on{color:#fff;border-color:transparent}
#modal-bg{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.32);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:flex-end;justify-content:center}
#modal-bg.on{display:flex}
#modal-box{width:100%;max-width:600px;max-height:93vh;overflow-y:auto;background:#e8eef8;border-radius:26px 26px 0 0;padding:0 0 40px;animation:sheetUp .32s cubic-bezier(.25,1,.5,1)}
[data-dark="1"] #modal-box{background:#1C1C1E}
.mhandle{width:36px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:10px auto 12px}
[data-dark="1"] .mhandle{background:rgba(255,255,255,.22)}
.msec{background:#ffffff;border-radius:14px;margin:0 16px 10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
[data-dark="1"] .msec{background:#2C2C2E}
.msec-lbl{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.6px;text-transform:uppercase;padding:14px 16px 4px;opacity:.7}
.mrow{padding:12px 14px;border-bottom:.5px solid rgba(0,0,0,.07);display:flex;align-items:center;gap:10px;min-height:44px}
[data-dark="1"] .mrow{border-bottom-color:rgba(255,255,255,.07)}
.mrow:last-child{border-bottom:none}
.mlbl{font-size:11px;color:var(--sub);min-width:60px;flex-shrink:0;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.minp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);outline:none;text-align:right}
.minp::placeholder{color:var(--chk)}
.msel{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--blue);outline:none;text-align:right;-webkit-appearance:none;cursor:pointer}
.mtitle{width:100%;border:none;background:transparent;font-family:inherit;font-size:20px;font-weight:700;color:var(--fg);outline:none;padding:16px 18px 8px;letter-spacing:-.3px}
.mtitle::placeholder{color:var(--chk)}
.mta{width:100%;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--sub);outline:none;min-height:48px;resize:none;padding:0 18px 16px;line-height:1.5}
.mta::placeholder{color:var(--chk)}
.mact{width:calc(100% - 32px);padding:14px;border:none;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;background:#ffffff;color:var(--blue);display:block;text-align:center;margin:0 16px 8px;border-radius:16px}
.mact.pri{font-weight:700;color:var(--blue)}
.mact.del{color:var(--red)}
.mact:active{opacity:.45}
.pri-row{display:flex;gap:8px;padding:10px 18px 14px;flex-wrap:wrap}
.pri-btn{flex:1;padding:7px 16px;border-radius:50px;border:none;background:rgba(0,122,255,.1);color:var(--blue);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.pri-btn.on{color:#fff;background:var(--blue)}
.sub-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:.5px solid rgba(0,0,0,.06)}
[data-dark="1"] .sub-item{border-bottom-color:rgba(255,255,255,.07)}
.sub-item:last-of-type{border-bottom:none}
.sub-add-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:.5px solid rgba(0,0,0,.06)}
.sub-inp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);outline:none}
.attach-list{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 10px}
.attach-chip{background:var(--sep);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px;cursor:pointer}
.fp{position:fixed;inset:0;z-index:850;background:linear-gradient(90deg,#f7fafd 0%,#ffffff 100%);display:none;flex-direction:column}
[data-dark="1"] .fp{background:#000000}
.fp.on{display:flex;animation:sheetUp .26s cubic-bezier(.25,1,.5,1)}
.fp-hdr{display:flex;align-items:center;padding:14px 16px 13px;background:#e8eef8;border-bottom:.5px solid rgba(0,0,0,.06);flex-shrink:0;gap:8px}
[data-dark="1"] .fp-hdr{background:#000000;border-bottom-color:rgba(255,255,255,.1)}
.fp-back{border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:17px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:400}
.fp-title2{flex:1;text-align:center;font-size:17px;font-weight:600;color:var(--fg)}
.fp-save{margin-left:auto;border:none;background:transparent;color:var(--blue);font-family:inherit;font-weight:600;font-size:17px;cursor:pointer}
.fp-scroll{flex:1;overflow-y:auto;padding:8px 0 30px}
#toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,35,.85);backdrop-filter:blur(20px) saturate(1.5);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:9998;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);animation:toastSpring .3s cubic-bezier(.25,1,.5,1) both}
#notif-bar{position:fixed;top:12px;left:10px;right:10px;z-index:9999;background:rgba(255,255,255,.95);backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8);border-radius:22px;padding:13px 15px;box-shadow:0 8px 32px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.07);display:none;align-items:center;gap:12px;animation:slideDown .38s cubic-bezier(.25,1,.5,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-60px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
#notif-bar.on{display:flex}
[data-dark="1"] #notif-bar{background:rgba(44,44,46,.95)}
#search{position:fixed;inset:0;z-index:870;background:rgba(190,215,245,.55);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);display:none;flex-direction:column;padding:10px 16px 0;padding-bottom:90px}
#search.on{display:flex;animation:fadeIn .18s ease}
.s-bar{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.9);border-radius:14px;padding:11px 14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:.5px solid rgba(0,0,0,.06)}
#s-inp{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:16px;color:var(--fg)}
#s-cancel{border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:16px;cursor:pointer;flex-shrink:0}
.s-filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 0 10px;flex-shrink:0}
.sf-chip{padding:4px 12px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .13s;background:var(--sep);color:var(--sub)}
.sf-chip.on{background:linear-gradient(135deg,rgba(0,122,255,.85),rgba(0,90,220,.9));color:#fff;box-shadow:0 2px 10px rgba(0,100,255,.25)}
#s-res{flex:1;overflow-y:auto}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none}
.chip{padding:5px 14px;border-radius:20px;border:.5px solid rgba(0,0,0,.06);cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap;transition:all .13s;flex-shrink:0;font-weight:500;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);box-shadow:0 1px 4px rgba(0,0,0,.07);color:#3a3a3c}
.chip.on{background:linear-gradient(135deg,rgba(0,122,255,.85),rgba(0,90,220,.9));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(0,100,255,.25)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 14px;gap:1px}
.cal-wd{text-align:center;font-size:11px;color:var(--sub);padding:3px 0;font-weight:500}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;gap:2px;transition:background .12s}
.cal-num{font-size:15px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.cal-cell.is-today .cal-num{background:var(--red);color:#fff;font-weight:700}
.cal-cell.is-sel:not(.is-today) .cal-num{background:var(--sep);font-weight:600}
.backup-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:.5px solid var(--sep);cursor:pointer}
.backup-row:active{background:var(--sep)}
.proj-card{background:rgba(255,255,255,.96);border-radius:18px;overflow:hidden;cursor:pointer;margin:0 16px 4px;border:.5px solid rgba(180,210,255,.25);box-shadow:0 2px 12px rgba(80,140,255,.08)}
[data-dark="1"] .proj-card{background:#2C2C2E;border-color:rgba(255,255,255,.08)}
.proj-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px}
.proj-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:16px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-desc{font-size:13px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-foot{padding:0 14px 14px}
.prog-bar{height:4px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden;margin-bottom:6px}
[data-dark="1"] .prog-bar{background:rgba(255,255,255,.1)}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#007AFF,#34C759);transition:width .6s cubic-bezier(.25,1,.5,1)}
.prog-meta{display:flex;justify-content:space-between;align-items:center}
.prog-meta span:first-child{font-size:12px;color:var(--sub)}
.prog-meta span:last-child{font-size:13px;font-weight:700}
.date-banner{padding:20px 20px 6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px;color:#6e6e73}
.date-banner::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:#007AFF;flex-shrink:0;opacity:.7}
#move-sheet-bg{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.32);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:flex-end;justify-content:center}
#move-sheet-bg.on{display:flex;animation:fadeIn .18s ease}
#move-sheet{width:100%;max-width:600px;background:linear-gradient(90deg,#f7fafd,#fff);border-radius:26px 26px 0 0;padding:0 0 40px;animation:sheetSpring .38s cubic-bezier(.22,1,.36,1)}
[data-dark="1"] #move-sheet{background:#1C1C1E}
.mv-handle{width:32px;height:4px;background:rgba(0,0,0,.18);border-radius:2px;margin:10px auto 12px}
.mv-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;padding:4px 18px 10px}
.mv-sec{background:#fff;border-radius:16px;margin:0 16px 8px;overflow:hidden;border:.5px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.06)}
[data-dark="1"] .mv-sec{background:#2C2C2E}
.mv-dates{display:flex;gap:7px;padding:12px 14px;flex-wrap:wrap}

.claude-msg{display:flex;flex-direction:column;gap:3px;max-width:88%}

.claude-msg.ai{align-self:flex-start;align-items:flex-start}
.claude-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word}
.claude-msg.user .claude-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:5px}
.claude-msg.ai .claude-bubble{background:rgba(255,255,255,.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:.5px solid rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(80,120,200,.08);color:var(--fg);border-bottom-left-radius:5px}
.claude-msg.ai .claude-lbl{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px;padding-left:2px}
.claude-typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--sub);animation:typingDot 1.2s infinite}
.claude-typing span:nth-child(2){animation-delay:.2s}
.claude-typing span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
[data-dark="1"] #claude-input-wrap{background:rgba(44,44,46,.82);border-color:rgba(255,255,255,.12)}
[data-dark="1"] .claude-msg.ai .claude-bubble{background:rgba(44,44,46,.85);border-color:rgba(255,255,255,.1)}
</style>
</head>

<script>
// ═══════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════
var D={tasks:[],reminders:[],events:[],notes:[],projects:[]};
var S={page:'inicio',prevPage:'inicio',weekOff:0,selDate:td0(),calY:new Date().getFullYear(),calM:new Date().getMonth(),calSel:td0(),calView:false,taskF:'todas',overdueOpen:true,showAllUpcoming:false,eTask:null,eRem:null,eEv:null};
var PAGE_ORDER=['inicio','hoje','entrada','projetos','notas','navegar'];
var WSHORT=['D','S','T','Q','Q','S','S'];
var WLONG=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
var MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var PROJ_COLORS=['#007AFF','#34C759','#FF9500','#AF52DE','#FF3B30','#5AC8FA','#FF2D55','#FFCC00'];
var TAG_PRESETS=[{name:'Trabalho',color:'#007AFF'},{name:'Pessoal',color:'#34C759'},{name:'Compras',color:'#FF9500'},{name:'Saúde',color:'#FF3B30'},{name:'Estudo',color:'#AF52DE'},{name:'Casa',color:'#5AC8FA'},{name:'Financeiro',color:'#FFCC00'}];
var _ped={id:null,color:PROJ_COLORS[0],tasks:[]};
var _ned={id:null,attach:[]};
var _curT=null;
var _notifIds=[];
// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function td0(){return iso(new Date())}
function iso(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function fmtD(ds){if(!ds)return'';var x=ds.split('-');return x[2]+' '+MS[+x[1]-1]}
function fmtDFull(ds){if(!ds)return'';var x=ds.split('-');return x[2]+' de '+MONTHS[+x[1]-1]+' de '+x[0]}
function isLate(d){return d&&d<td0()}
function isToday(d){return d===td0()}
function isTom(d){var x=new Date();x.setDate(x.getDate()+1);return d===iso(x)}
function addDays(ds,n){var d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return iso(d)}
function weekStart(off){var d=new Date(),dow=d.getDay(),m=new Date(d);m.setDate(d.getDate()-((dow+6)%7)+off*7);m.setHours(0,0,0,0);return m}
function tagColor(name){var t=TAG_PRESETS.find(function(x){return x.name===name});return t?t.color:'#8E8E93'}
function haiku(v){return navigator.vibrate&&navigator.vibrate(v)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
// ═══════════════════════════════════════

function handleRecurrence(task){if(!task.recurrence||task.recurrence==='none'||!task.dueDate)return;var d=new Date(task.dueDate+'T12:00'),origDay=d.getDate(),next=new Date(d);if(task.recurrence==='daily'){next.setDate(next.getDate()+1);while(next<=new Date())next.setDate(next.getDate()+1);}else if(task.recurrence==='weekly'){next.setDate(next.getDate()+7);while(next<=new Date())next.setDate(next.getDate()+7);}else if(task.recurrence==='monthly'){next.setMonth(next.getMonth()+1);while(next<=new Date())next.setMonth(next.getMonth()+1);next.setDate(Math.min(origDay,new Date(next.getFullYear(),next.getMonth()+1,0).getDate()));}else if(task.recurrence==='yearly'){next.setFullYear(next.getFullYear()+1);while(next<=new Date())next.setFullYear(next.getFullYear()+1);}var t2=Object.assign({},task,{id:uid(),done:false,dueDate:iso(next),createdAt:new Date().toISOString()});D.tasks.unshift(t2);}

//  SWIPE
// ═══════════════════════════════════════
function addSwipe(el,onDone,onDel){
  var sx=0,sy=0,dx=0,dy=0,THR=72,LOCK=12;
  var state='idle'; // idle | h-locked | v-locked
  function reset(){
    state='idle';dx=0;dy=0;
    el.style.transform='';
    var bgR=el.querySelector('.swipe-bg-r'),bgL=el.querySelector('.swipe-bg-l');
    if(bgR)bgR.style.opacity=0;if(bgL)bgL.style.opacity=0;
  }
  el.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;dy=0;state='idle';
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    dx=e.touches[0].clientX-sx;
    dy=e.touches[0].clientY-sy;
    var adx=Math.abs(dx),ady=Math.abs(dy);
    // Determine direction lock
    if(state==='idle'){
      if(adx<LOCK&&ady<LOCK)return; // not moved enough yet
      if(ady>adx){state='v-locked';return;} // vertical scroll wins
      state='h-locked'; // horizontal swipe wins
    }
    if(state==='v-locked')return; // let browser scroll
    // Horizontal locked — handle swipe
    e.preventDefault();
    var pct=Math.min(adx/THR,1);
    el.style.transform='translateX('+dx+'px)';
    var bgR=el.querySelector('.swipe-bg-r'),bgL=el.querySelector('.swipe-bg-l');
    if(bgR)bgR.style.opacity=dx>0?pct:0;
    if(bgL)bgL.style.opacity=dx<0?pct:0;
  },{passive:false});
  el.addEventListener('touchend',function(){
    if(state==='h-locked'){
      if(dx>THR){haiku([10,5,10]);onDone();}
      else if(dx<-THR){haiku([30]);onDel();}
      else reset();
    } else {
      reset();
    }
  },{passive:true});
  el.addEventListener('touchcancel',reset,{passive:true});
}

function fmtBRL(v){return'R$\u00a0'+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}


function _autoImportar(){
  var n=0;
  function jaExiste(id,tipo){return D.tasks.some(function(t){return t.agRef&&t.agRef.id===id&&t.agRef.tipo===tipo;});}
  AG_DATA.despesas.forEach(function(d){
    if(!d.id)return; // ignora sem id
    if(!jaExiste(d.id,'despesa')){D.tasks.push(_mkTask(d,'despesa'));n++;}
  });
  AG_DATA.orcamento.forEach(function(o){
    if(!o.id)return;
    if(!jaExiste(o.id,'orcamento')){D.tasks.push(_mkTask(o,'orcamento'));n++;}
  });
  if(n>0){save();console.log('[AG] '+n+' tarefa(s) importada(s) automaticamente');}
  else console.log('[AG] Nenhuma tarefa nova para importar');
}

function _mkTask(item,tipo){
  var data=item._data||td0();
  var vencida=data&&data<td0();
  var icon=tipo==='despesa'?'🧾 ':'💸 ';
  return{
    id:uid(),
    title:icon+(item.descricao||'Sem descrição'),
    notes:fmtBRL(item.valor)+(item.categoria?' · '+item.categoria:'')+(item.recorrente?' · ↻':''),
    dueDate:data,dueTime:'',done:false,recurrence:'none',
    priority:vencida?'high':'medium',
    subtasks:[],attachments:[],
    tags:['Financeiro','AutoGest'],
    notifyOffsets:[1440],
    agRef:{tipo:tipo,id:item.id},
    createdAt:new Date().toISOString()
  };
}

function loadAutoGestData(cb){
  if(AG_DATA.loading)return;
  var origin=window.location.origin||'';
  var isGitHub=origin.indexOf('github.io')>=0||origin.indexOf('netlify')>=0||origin.indexOf('capimglau')>=0||origin.indexOf('localhost')>=0;
  if(!isGitHub){
    AG_DATA.loaded=true;AG_DATA.loading=false;
    AG_DATA._blockedOrigin=origin;
    if(cb)cb();
    return;
  }
  AG_DATA.loading=true;
  Promise.all([
    AG.get('despesas',''),
    AG.get('orcamentopessoal',''),
    AG.get('contas','tipo=eq.pagar')
  ]).then(function(res){
    var rawDesp   = res[0]||[];
    var rawOrc    = res[1]||[];
    var rawContas = res[2]||[];
    // Guarda raw para diagnóstico
    AG_DATA._rawOrc=rawOrc;
    AG_DATA._rawDesp=rawDesp;
    console.log('[AG] raw desp='+rawDesp.length+' orc='+rawOrc.length+' contas='+rawContas.length);
    if(rawOrc.length>0)console.log('[AG] ORC[0]='+JSON.stringify(rawOrc[0]));
    if(rawDesp.length>0)console.log('[AG] DESP[0]='+JSON.stringify(rawDesp[0]));
    console.log('[AG] raw: desp='+rawDesp.length+' orc='+rawOrc.length+' contas='+rawContas.length);
    // Log first orc record to see ALL fields
    if(rawOrc.length>0){
      console.log('[AG] ORC SAMPLE:',JSON.stringify(rawOrc[0]));
      // Check which field has the date
      var sample=rawOrc[0];
      var dateFields=['data','dataprevista','vencimento','competencia','dt','mes','periodo','data_vencimento'];
      dateFields.forEach(function(f){if(sample[f]!==undefined)console.log('[AG] orc.'+f+'=',sample[f]);});
      // Check status field
      if(sample.status!==undefined)console.log('[AG] orc.status=',sample.status);
      if(sample.databaixa!==undefined)console.log('[AG] orc.databaixa=',sample.databaixa);
      if(sample.tipo!==undefined)console.log('[AG] orc.tipo=',sample.tipo);
    }
    if(rawDesp.length>0)  console.log('[AG] campos despesa:',  Object.keys(rawDesp[0]).join(','));
    if(rawOrc.length>0)   console.log('[AG] campos orc:',      Object.keys(rawOrc[0]).join(','));
    if(rawContas.length>0)console.log('[AG] campos contas:',   Object.keys(rawContas[0]).join(','));

    // Normaliza o campo de data — tenta TODOS os campos possíveis
    function norm(arr){
      return arr.map(function(item){
        // Tenta todos os campos de data conhecidos do AutoGest
        var d = item.dataprevista||item.vencimento||item.data||item.dt||
                item.date||item.dueDate||item.due_date||item.data_vencimento||
                item.data_prevista||item.competencia||item.mes||'';
        // Handle YYYY-MM format → use last day of month
        if(d&&/^\d{4}-\d{2}$/.test(d))d=d+'-28';
        // Normaliza para YYYY-MM-DD
        if(d&&d.length>10)d=d.slice(0,10);
        // Aceita qualquer coisa que comece com YYYY-MM-DD (sem rejeitar)
        if(d&&d.length<10)d='';
        item._data=d;
        return item;
      });
    }

    // Despesas financeiro — inclui atrasadas e pendentes
    if(rawDesp.length>0){
      rawDesp.forEach(function(d,i){
        if(i<3)console.log('[AG] desp['+i+']',JSON.stringify(d).slice(0,200));
      });
    }
    AG_DATA.despesas = norm(rawDesp).filter(function(d){
      var pgto=d.datapagamento||d.data_pagamento||d.dataPagamento||'';
      if(pgto&&String(pgto).trim()!=='')return false;
      var s=String(d.status||'').toLowerCase();
      return s!=='pago'&&s!=='baixado'&&s!=='recebido'&&s!=='quitado'&&s!=='cancelado';
    });

    // Orçamento pessoal — log completo para diagnóstico
    console.log('[AG] ORC RAW count:',rawOrc.length);
    if(rawOrc.length>0){
      console.log('[AG] ORC[0] keys:',Object.keys(rawOrc[0]).join(','));
      console.log('[AG] ORC[0] full:',JSON.stringify(rawOrc[0]));
      // Log status values
      var statuses=rawOrc.map(function(o){return o.status||'(vazio)';});
      console.log('[AG] ORC statuses:',statuses.slice(0,10).join(','));
      // Log databaixa values
      var baixas=rawOrc.map(function(o){return o.databaixa||'null';});
      console.log('[AG] ORC databaixas:',baixas.slice(0,10).join(','));
    }
    // FILTRO MÍNIMO: só exclui se databaixa preenchida E não nula
    AG_DATA.orcamento = norm(rawOrc).filter(function(o){
      var baixa=o.databaixa;
      if(baixa!==null&&baixa!==undefined&&String(baixa).trim()!==''&&String(baixa)!=='null')return false;
      var s=String(o.status||'').toLowerCase().trim();
      if(s==='pago'||s==='baixado'||s==='recebido'||s==='quitado')return false;
      return true;
    });
    console.log('[AG] ORC filtrado:',AG_DATA.orcamento.length,'de',rawOrc.length);

    // Contas a pagar — inclui pendentes e atrasadas
    AG_DATA.contas = norm(rawContas).filter(function(c){
      if(c.datapagamento&&String(c.datapagamento).trim()!=='')return false;
      var s=String(c.status||'').toLowerCase();
      return s!=='pago'&&s!=='baixado'&&s!=='quitado'&&s!=='cancelado';
    });

    console.log('[AG] filtrado: desp='+AG_DATA.despesas.length+' orc='+AG_DATA.orcamento.length+' contas='+AG_DATA.contas.length);
    AG_DATA.loaded=true; AG_DATA.loading=false; AG_DATA.lastSync=new Date();
    _autoImportar();
    if(cb)cb();
  }).catch(function(e){
    console.error('[AG] erro:',e.message||e);
    AG_DATA.loading=false;
    if(cb)cb();
  });
}

function _mkTask(item,tipo){
  var s=String(item.status||'').toLowerCase();
  var isOverdue=s==='atrasado'||s==='vencido'||s==='atraso';
  // Se tem data usa ela; se não tem mas está atrasado usa ontem; senão hoje
  var data=item._data&&item._data.length>=10
    ? item._data.slice(0,10)
    : isOverdue ? addDays(td0(),-1) : td0();
  var vencida=data<td0();
  var icon=tipo==='despesa'?'🧾 ':tipo==='conta'?'💳 ':'💸 ';
  return{
    id:uid(),
    title:icon+(item.descricao||item.nome||'Sem descrição'),
    notes:fmtBRL(item.valor)+(item.categoria?' · '+item.categoria:'')+(item.recorrente?' · ↻':''),
    dueDate:data,
    dueTime:'',done:false,recurrence:'none',
    priority:vencida?'high':'medium',
    subtasks:[],attachments:[],
    tags:['Financeiro','AutoGest'],
    notifyOffsets:[1440],
    agRef:{tipo:tipo,id:item.id},
    createdAt:new Date().toISOString()
  };
}

    var icon=tipo==='despesa'?'🧾':'💸';var bgClr=tipo==='despesa'?'rgba(175,82,222,.12)':'rgba(255,59,48,.1)';

    var iconEl=document.createElement('div');iconEl.style.cssText='width:36px;height:36px;border-radius:10px;background:'+bgClr+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0';iconEl.textContent=icon;

    else{var btn=document.createElement('button');btn.style.cssText='font-size:10px;padding:5px 9px;border-radius:8px;background:rgba(0,122,255,.1);color:var(--blue);border:none;cursor:pointer;font-weight:700';btn.textContent='+ Task';btn.onclick=(function(it,tp){return function(e){e.stopPropagation();importarItemComoTarefa(it,tp);};})(item,tipo);btnEl.appendChild(btn);}
    row.appendChild(iconEl);row.appendChild(infoEl);row.appendChild(btnEl);card.appendChild(row);
  });
  return card;
}

var _claudeHistory = [];

function openClaude(){
  document.getElementById('claude-panel').classList.add('on');
  // Show welcome if empty
  var msgs = document.getElementById('claude-msgs');
  if(!msgs.children.length){

  }
  setTimeout(function(){document.getElementById('claude-inp').focus();},200);
}

function closeClaude(){
  document.getElementById('claude-panel').classList.remove('on');
}

function clearClaude(){
  _claudeHistory=[];
  document.getElementById('claude-msgs').innerHTML='';
  _addClaudeMsg('ai','Conversa limpa! Como posso ajudar?');
}

function _addClaudeMsg(role, text){
  var msgs = document.getElementById('claude-msgs');
  var wrap = document.createElement('div');
  wrap.className = 'claude-msg '+(role==='user'?'user':'ai');
  if(role==='ai'){
    var lbl = document.createElement('div');
    lbl.className = 'claude-lbl';
    lbl.textContent = '✦ Claude';
    wrap.appendChild(lbl);
  }
  var bubble = document.createElement('div');
  bubble.className = 'claude-bubble';
  // Render markdown-lite: **bold**, bullet lists, line breaks
  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
    .replace(/^[•\-] (.+)$/gm,'<div style="padding-left:12px">• $1</div>')
    .replace(/\n/g,'<br>');
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function _addTyping(){
  var msgs = document.getElementById('claude-msgs');
  var wrap = document.createElement('div');
  wrap.className = 'claude-msg ai';
  var lbl = document.createElement('div');
  lbl.className = 'claude-lbl';
  lbl.textContent = '✦ Claude';
  wrap.appendChild(lbl);
  var bubble = document.createElement('div');
  bubble.className = 'claude-bubble claude-typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function sendToClaude(){
  var inp = document.getElementById('claude-inp');
  var text = (inp.value||'').trim();
  if(!text) return;
  inp.value = ''; inp.style.height = 'auto';

  // Add user message
  _addClaudeMsg('user', text);
  _claudeHistory.push({role:'user', content:text});

  // Show typing
  var typingEl = _addTyping();
  document.getElementById('claude-send').style.opacity = '.4';

  // Build context about user's data
  var today = td0();
  var overdueTasks = D.tasks.filter(function(t){return !t.done&&t.dueDate&&t.dueDate<today;});
  var todayTasks = D.tasks.filter(function(t){return !t.done&&t.dueDate===today;});
  var upcoming = D.tasks.filter(function(t){return !t.done&&t.dueDate&&t.dueDate>today;}).slice(0,10);
  var recentNotes = D.notes.slice(0,5);

  var context = 'Contexto do usuário (FocusFlow App):\n'
    + '- Data hoje: ' + today + '\n'
    + '- Tarefas atrasadas (' + overdueTasks.length + '): ' + overdueTasks.slice(0,5).map(function(t){return t.title + (t.dueDate?' ('+t.dueDate+')':'');}).join(', ') + '\n'
    + '- Tarefas de hoje (' + todayTasks.length + '): ' + todayTasks.map(function(t){return t.title;}).join(', ') + '\n'
    + '- Próximas tarefas: ' + upcoming.map(function(t){return t.title + ' (' + t.dueDate + ')';}).join(', ') + '\n'
    + '- Total tarefas: ' + D.tasks.filter(function(t){return !t.done;}).length + '\n'
    + '- Projetos: ' + D.projects.map(function(p){return p.title;}).join(', ') + '\n'
    + '- Notas recentes: ' + recentNotes.map(function(n){return n.title;}).join(', ') + '\n'
    + '\nResponda em português. Seja conciso e direto. Quando criar tarefas ou lembretes, informe que o usuário pode adicioná-los manualmente. Não use markdown excessivo.';

  // Build messages for API
  var messages = [{role:'user', content: context + '\n\n---\nUsuário: ' + text}];
  // Include recent history (last 6 turns)
  if(_claudeHistory.length > 2){
    messages = _claudeHistory.slice(-7, -1).concat([{
      role: 'user',
      content: context + '\n\n---\n' + _claudeHistory[_claudeHistory.length-1].content
    }]);
  }

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: 'Você é um assistente de produtividade integrado ao FocusFlow, app de tarefas e agenda. Ajude o usuário a organizar compromissos, criar tarefas, buscar informações nas suas notas e projetos, e responder perguntas gerais. Seja conciso, amigável e prático. Responda sempre em português.',
      messages: messages
    })
  }).then(function(r){return r.json();})
  .then(function(data){
    typingEl.remove();
    var reply = (data.content&&data.content[0]&&data.content[0].text) || 'Desculpe, não consegui processar.';
    _addClaudeMsg('ai', reply);
    _claudeHistory.push({role:'assistant', content: reply});
    document.getElementById('claude-send').style.opacity = '1';
  }).catch(function(e){
    typingEl.remove();
    _addClaudeMsg('ai', 'Erro de conexão. Verifique sua internet e tente novamente.');
    document.getElementById('claude-send').style.opacity = '1';
  });
}

var dpEl=document.getElementById('p-inicio');if(dpEl)dpEl.classList.add('active');
document.querySelectorAll('.nb[data-p]').forEach(function(b){b.classList.toggle('on',b.dataset.p==='inicio');});
renderInicio();
updateBadges();

// Tap feedback
document.addEventListener('touchstart',function(e){var el=e.target.closest('button,.nb,.irow');if(!el)return;if(navigator.vibrate)navigator.vibrate(6);},{passive:true});

// Swipe down to close modal
(function(){var box,startY2=0,isDragging=false;document.addEventListener('touchstart',function(e){box=document.getElementById('modal-box');if(!box)return;var mb=document.getElementById('modal-bg');if(!mb||!mb.classList.contains('on'))return;if(box.contains(e.target)&&box.scrollTop===0){startY2=e.touches[0].clientY;isDragging=true;}},{passive:true});document.addEventListener('touchmove',function(e){if(!isDragging||!box)return;var dy=e.touches[0].clientY-startY2;if(dy>0)box.style.transform='translateY('+(dy*0.5)+'px)';},{passive:true});document.addEventListener('touchend',function(e){if(!isDragging||!box)return;var dy=e.changedTouches[0].clientY-startY2;box.style.transition='transform .3s cubic-bezier(.25,1,.5,1)';if(dy>80){closeModal();}else{box.style.transform='';}setTimeout(function(){if(box)box.style.transition='';},320);isDragging=false;startY2=0;},{passive:true});})();


// ── Edge swipe back (≤30px from left) ──────────────────────
(function(){
  var startX=0,startY=0,tracking=false,overlay=null;
  document.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    tracking=startX<=30; // only track from left edge
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!tracking)return;
    var dx=e.touches[0].clientX-startX;
    var dy=Math.abs(e.touches[0].clientY-startY);
    if(dy>dx){tracking=false;return;} // vertical — cancel
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!tracking)return;
    tracking=false;
    var dx=e.changedTouches[0].clientX-startX;
    if(dx>60){ // swiped right > 60px from left edge
      // Close modal if open
      var bg=document.getElementById('modal-bg');
      if(bg&&bg.classList.contains('on')){closeModal();return;}
      // Close note editor if open
      var ned=document.getElementById('ned');
      if(ned&&ned.classList.contains('on')){closeNoteEd();return;}
      // Close project editor if open
      var ped=document.getElementById('ped');
      if(ped&&ped.classList.contains('on')){closeProjEd();return;}
      // Go back to previous page or inicio
      if(S.prevPage&&S.prevPage!==S.page)goPage(S.prevPage);
      else goPage('inicio');
    }
  },{passive:true});
})();
// PWA banner
if(!window.navigator.standalone&&!window.matchMedia('(display-mode: standalone)').matches){
  setTimeout(function(){document.getElementById('pwa-banner').classList.add('on');},6000);
}
</script>
