<!DOCTYPE html>
<html lang="pt-BR" data-dark="0">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<meta name="theme-color" content="#007AFF" id="theme-color-meta">
<title>FocusFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var s=localStorage.getItem('ff-dark');
  var sys=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var dark=(s==='1')||(s===null&&sys);
  if(dark){document.documentElement.setAttribute('data-dark','1');document.documentElement.style.cssText='background-color:#000000;color-scheme:dark';}
})();
function updateThemeColor(){var meta=document.getElementById('theme-color-meta');if(!meta)return;var dark=document.documentElement.getAttribute('data-dark')==='1';meta.content=dark?'#1c1c1e':'#e8effa';}
updateThemeColor();
</script>
<style>
:root{--bg:transparent;--card:#FFFFFF;--card2:#F2F2F7;--fg:#000000;--sub:#8E8E93;--sep:rgba(0,0,0,.06);--line:rgba(0,0,0,.09);--shadow:rgba(0,0,0,.06);--blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;--purple:#AF52DE;--teal:#5AC8FA;--pink:#FF2D55;--yellow:#FFCC00;--chk:#C7C7CC;--nav-bg:rgba(255,255,255,.72);--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);}
[data-dark="1"]{--bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;--fg:#FFFFFF;--sub:#8E8E93;--sep:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--shadow:rgba(0,0,0,.3);--chk:#48484A;--nav-bg:rgba(28,28,30,.85);}
[data-dark="1"] body,[data-dark="1"] html{background-color:#000000!important}
[data-dark="1"] .pages,[data-dark="1"] *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;}
body{font-family:'Inter',-apple-system,sans-serif;background:transparent;color:var(--fg);-webkit-font-smoothing:antialiased;min-height:100vh;}
.pages{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;background:transparent}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding-bottom:88px;display:none;background:transparent;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.page.on{display:block!important}
.page.active{display:block}
@keyframes slideInR{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInL{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes sheetSpring{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bannerSlideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes chkBounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.82)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes toastSpring{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes lp-pulse{0%{box-shadow:0 0 0 0 rgba(0,122,255,.4)}70%{box-shadow:0 0 0 10px rgba(0,122,255,0)}100%{box-shadow:0 0 0 0 rgba(0,122,255,0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.page.anim-r{animation:slideInR .22s cubic-bezier(.25,1,.5,1)}
.page.anim-l{animation:slideInL .22s cubic-bezier(.25,1,.5,1)}
.page.anim-f{animation:fadeIn .18s ease}
.hdr{padding:calc(env(safe-area-inset-top,59px) + 4px) 18px 6px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center}
.hdr-left small{display:none}
.hdr-act{display:flex;gap:2px;align-items:center;background:rgba(255,255,255,.7);backdrop-filter:blur(80px) saturate(4) brightness(1.14);-webkit-backdrop-filter:blur(80px) saturate(4) brightness(1.14);border:.5px solid rgba(255,255,255,.88);box-shadow:0 1.5px 0 rgba(255,255,255,.96) inset,0 4px 20px rgba(80,100,180,.12);border-radius:50px;padding:4px 6px;}
[data-dark="1"] .hdr-act{background:rgba(44,44,46,.88);border-color:rgba(255,255,255,.12);box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 4px 16px rgba(0,0,0,.35)}
.hdr-btn{border:none;background:transparent;cursor:pointer;padding:0;width:38px;height:38px;border-radius:50px;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--sub)}
.hdr-btn:active{background:var(--sep)}
.week-wrap{display:flex;align-items:center;padding:14px 14px 10px;gap:0}
.w-arr{border:none;background:transparent;cursor:pointer;color:var(--sub);font-size:24px;padding:2px 6px;line-height:1;flex-shrink:0}
.wdays{flex:1;display:flex;justify-content:space-between}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 2px 2px;border-radius:10px;min-width:0}
.wday-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.2px;font-weight:400}
.wday-n{font-size:15px;font-weight:300;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--fg)}
.wday.is-today .wday-n{background:#e03120;color:#fff;font-weight:500}
.wday.is-sel:not(.is-today) .wday-n{background:rgba(0,122,255,.10);color:var(--blue)}
.wday-dot{width:4px;height:4px;border-radius:50%;background:var(--sub);opacity:.4}
.week-divider{height:.5px;background:linear-gradient(90deg,transparent 0%,rgba(150,185,230,.45) 20%,rgba(150,185,230,.45) 80%,transparent 100%);margin:0 20px 4px;flex-shrink:0}
.sec{padding:16px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:12px;color:var(--sub);font-weight:600;letter-spacing:.3px}
.sec-t b{color:var(--fg);font-weight:700;font-size:13px}
.sec-act{border:none;background:rgba(0,0,0,.04);color:#6e6e73;font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:600;padding:4px 10px;border-radius:8px}
.card{background:rgba(255,255,255,.96);border-radius:18px;margin:0 16px 4px;overflow:hidden;border:.5px solid rgba(180,210,255,.25);box-shadow:0 1px 0 rgba(255,255,255,1) inset,0 2px 10px rgba(80,140,255,.06),0 6px 20px rgba(60,100,220,.05)}
[data-dark="1"] .card{background:var(--card);border-color:rgba(255,255,255,.06)}
.irow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:.5px solid rgba(0,0,0,.05);cursor:pointer;transition:background .1s;position:relative;overflow:hidden;background:transparent;touch-action:pan-y;min-height:52px}
.irow:last-child{border-bottom:none!important}
.irow:active{background:rgba(0,122,255,.06)!important}
.irow .swipe-bg-l,.irow .swipe-bg-r{position:absolute;top:0;bottom:0;width:100%;display:flex;align-items:center;padding:0 22px;font-size:13px;font-weight:700;color:#fff;pointer-events:none;opacity:0;transition:opacity .12s}
.irow .swipe-bg-r{background:var(--green);justify-content:flex-start;left:0}
.irow .swipe-bg-l{background:var(--red);justify-content:flex-end;right:0}
@keyframes checkBounce{0%{transform:scale(1)}35%{transform:scale(1.35)}65%{transform:scale(.88)}100%{transform:scale(1)}}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s cubic-bezier(.25,1,.5,1);background:transparent}
.chk.done{background:#34C759;border-color:#34C759;box-shadow:0 2px 8px rgba(52,199,89,.35);animation:chkBounce .4s cubic-bezier(.25,1,.5,1)}
.chk.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.ibody{min-width:0;flex:1}
.ititle{font-size:15px;font-weight:400;line-height:1.35;color:var(--fg);letter-spacing:-.1px}
.ititle.done{color:var(--sub);text-decoration:line-through}
.inotes{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.imeta{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;align-items:center;font-size:12px;color:var(--sub)}
.idate{font-size:12px;color:var(--sub)}
.idate.late{color:var(--red)}
.idate.today-c{color:var(--blue)}
.drag-handle{width:18px;color:var(--chk);cursor:grab;flex-shrink:0;font-size:14px;text-align:center;opacity:.4;touch-action:none}
.dragging{opacity:.35}
.drag-over{border-top:2px solid var(--blue)}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px}
.tag-sel-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px}
.tag-opt{font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1.5px solid rgba(0,0,0,.1);cursor:pointer;transition:all .15s;background:rgba(255,255,255,.6);color:var(--fg)}
[data-dark="1"] .tag-opt{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.tag-opt.on{color:#fff;border-color:transparent}
#modal-bg{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.32);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:flex-end;justify-content:center}
#modal-bg.on{display:flex}
#modal-box{width:100%;max-width:600px;max-height:93vh;overflow-y:auto;background:transparent;border-radius:13px 13px 0 0;padding:0;animation:sheetUp .32s cubic-bezier(.25,1,.5,1)}
[data-dark="1"] #modal-box{background:#1C1C1E}
.mhandle{width:36px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:10px auto 12px}
[data-dark="1"] .mhandle{background:rgba(255,255,255,.22)}
.msec{background:#ffffff;border:.5px solid rgba(0,0,0,.07);border-radius:14px;margin:0 16px 10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
[data-dark="1"] .msec{background:#2C2C2E}
.msec-lbl{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.6px;text-transform:uppercase;padding:14px 16px 4px;opacity:.7}
.mrow{padding:12px 14px;border-bottom:.5px solid rgba(0,0,0,.05);display:flex;align-items:center;gap:10px;min-height:44px}
[data-dark="1"] .mrow{border-bottom-color:rgba(255,255,255,.07)}
.mrow:last-child{border-bottom:none}
.mlbl{font-size:11px;color:var(--sub);min-width:60px;flex-shrink:0;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.minp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);outline:none;text-align:right}
.minp::placeholder{color:var(--chk)}
.msel{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--blue);outline:none;text-align:right;-webkit-appearance:none;cursor:pointer}
.mtitle{width:100%;border:none;background:transparent;font-family:inherit;font-size:20px;font-weight:700;color:var(--fg);outline:none;padding:16px 18px 8px;letter-spacing:-.3px}
.mtitle::placeholder{color:var(--chk)}
.mta{width:100%;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--sub);outline:none;min-height:48px;resize:none;padding:0 18px 16px;line-height:1.5}
.mta::placeholder{color:var(--chk)}
.mact{width:calc(100% - 32px);padding:14px;border:none;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;background:#ffffff;border:.5px solid rgba(0,0,0,.07);color:var(--blue);display:block;text-align:center;margin:0 16px 8px;border-radius:16px}
.mact.pri{font-weight:700;color:var(--blue)}
.mact.del{color:var(--red)}
.mact:active{opacity:.45}
.pri-row{display:flex;gap:8px;padding:10px 18px 14px;flex-wrap:wrap}
.pri-btn{flex:1;padding:7px 16px;border-radius:50px;border:none;background:rgba(0,122,255,.1);color:var(--blue);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.pri-btn.on{color:#fff;background:var(--blue)}
.sub-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:.5px solid rgba(0,0,0,.06)}
[data-dark="1"] .sub-item{border-bottom-color:rgba(255,255,255,.07)}
.sub-item:last-of-type{border-bottom:none}
.sub-add-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:.5px solid rgba(0,0,0,.06)}
.sub-inp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);outline:none}
.attach-list{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 10px}
.attach-chip{background:var(--sep);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px;cursor:pointer}
.fp{position:fixed;inset:0;z-index:850;background:linear-gradient(90deg,#f7fafd 0%,#ffffff 100%);display:none;flex-direction:column}
[data-dark="1"] .fp{background:#000000}
.fp.on{display:flex;animation:sheetUp .26s cubic-bezier(.25,1,.5,1)}
.fp-hdr{display:flex;align-items:center;padding:14px 16px 13px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid rgba(0,0,0,.12);flex-shrink:0;gap:8px}
[data-dark="1"] .fp-hdr{background:#000000;border-bottom-color:rgba(255,255,255,.1)}
.fp-back{border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:17px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:400}
.fp-title2{flex:1;text-align:center;font-size:17px;font-weight:600;color:var(--fg)}
.fp-save{margin-left:auto;border:none;background:transparent;color:var(--blue);font-family:inherit;font-weight:600;font-size:17px;cursor:pointer}
.fp-scroll{flex:1;overflow-y:auto;padding:8px 0 30px}
#toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,35,.85);backdrop-filter:blur(20px) saturate(1.5);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:9998;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);animation:toastSpring .3s cubic-bezier(.25,1,.5,1) both}
#notif-bar{position:fixed;top:12px;left:10px;right:10px;z-index:9999;background:rgba(255,255,255,.95);backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8);border-radius:22px;padding:13px 15px;box-shadow:0 8px 32px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.07);display:none;align-items:center;gap:12px;animation:slideDown .38s cubic-bezier(.25,1,.5,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-60px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
#notif-bar.on{display:flex}
[data-dark="1"] #notif-bar{background:rgba(44,44,46,.95)}
#search{position:fixed;inset:0;z-index:870;background:rgba(190,215,245,.55);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);display:none;flex-direction:column;padding:10px 16px 0;padding-bottom:90px}
#search.on{display:flex;animation:fadeIn .18s ease}
.s-bar{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.9);border-radius:14px;padding:11px 14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:.5px solid rgba(0,0,0,.06)}
#s-inp{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:16px;color:var(--fg)}
#s-cancel{border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:16px;cursor:pointer;flex-shrink:0}
.s-filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 0 10px;flex-shrink:0}
.sf-chip{padding:4px 12px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .13s;background:var(--sep);color:var(--sub)}
.sf-chip.on{background:linear-gradient(135deg,rgba(0,122,255,.85),rgba(0,90,220,.9));color:#fff;box-shadow:0 2px 10px rgba(0,100,255,.25)}
#s-res{flex:1;overflow-y:auto}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none}
.chip{padding:3px 10px;border-radius:20px;border:.5px solid rgba(0,0,0,.06);cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;transition:all .13s;flex-shrink:0;font-weight:500;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);box-shadow:0 1px 4px rgba(0,0,0,.07);color:#3a3a3c}
.chip.on{background:linear-gradient(135deg,rgba(0,122,255,.85),rgba(0,90,220,.9));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(0,100,255,.25)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 14px;gap:1px}
.cal-wd{text-align:center;font-size:11px;color:var(--sub);padding:3px 0;font-weight:500}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;gap:2px;transition:background .12s}
.cal-num{font-size:15px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--fg)}
.cal-cell.is-today .cal-num{background:var(--red);color:#fff;font-weight:700}
.cal-cell.is-sel:not(.is-today) .cal-num{background:var(--sep);font-weight:600}
.backup-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:.5px solid var(--sep);cursor:pointer}
.backup-row:active{background:var(--sep)}
.proj-card{background:rgba(255,255,255,.96);border-radius:18px;overflow:hidden;cursor:pointer;margin:0 16px 4px;border:.5px solid rgba(180,210,255,.25);box-shadow:0 2px 12px rgba(80,140,255,.08)}
[data-dark="1"] .proj-card{background:#2C2C2E;border-color:rgba(255,255,255,.08)}
.proj-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px}
.proj-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:16px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-desc{font-size:13px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-foot{padding:0 14px 14px}
.prog-bar{height:4px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden;margin-bottom:6px}
[data-dark="1"] .prog-bar{background:rgba(255,255,255,.1)}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#007AFF,#34C759);transition:width .6s cubic-bezier(.25,1,.5,1)}
.prog-meta{display:flex;justify-content:space-between;align-items:center}
.prog-meta span:first-child{font-size:12px;color:var(--sub)}
.prog-meta span:last-child{font-size:13px;font-weight:700}
.date-banner{padding:20px 20px 6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px;color:#6e6e73}
.date-banner::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:#007AFF;flex-shrink:0;opacity:.7}
#move-sheet-bg{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.32);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:flex-end;justify-content:center}
#move-sheet-bg.on{display:flex;animation:fadeIn .18s ease}
#move-sheet{width:100%;max-width:600px;background:linear-gradient(90deg,#f7fafd,#fff);border-radius:26px 26px 0 0;padding:0 0 40px;animation:sheetSpring .38s cubic-bezier(.22,1,.36,1)}
[data-dark="1"] #move-sheet{background:#1C1C1E}
.mv-handle{width:32px;height:4px;background:rgba(0,0,0,.18);border-radius:2px;margin:10px auto 12px}
.mv-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;padding:4px 18px 10px}
.mv-sec{background:#fff;border-radius:16px;margin:0 16px 8px;overflow:hidden;border:.5px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.06)}

var _curT={};

// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
var TAG_PRESETS=[
  {name:'Trabalho',color:'#007AFF'},{name:'Pessoal',color:'#34C759'},
  {name:'Saúde',color:'#FF2D55'},{name:'Financeiro',color:'#FF9500'},
  {name:'Família',color:'#AF52DE'},{name:'Compras',color:'#FF9500'},

var WSHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function td0(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function iso(d){return d.toISOString().slice(0,10);}
function addDays(ds,n){var d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return iso(d);}
function weekStart(ds){var d=new Date(ds+'T12:00');d.setDate(d.getDate()-d.getDay());return iso(d);}
function isToday(ds){return ds===td0();}
function isTom(ds){return ds===addDays(td0(),1);}
function isLate(ds){return ds&&ds<td0();}
function fmtD(ds){
  if(!ds)return '';
  if(isToday(ds))return 'Hoje';
  if(isTom(ds))return 'Amanhã';
  var d=new Date(ds+'T12:00');
  var months=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return d.getDate()+' '+months[d.getMonth()];
}
function fmtDFull(ds){
  if(!ds)return '';
  var d=new Date(ds+'T12:00');
  var months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return d.getDate()+' de '+months[d.getMonth()]+' de '+d.getFullYear();
}
function fmtBRL(v){
  v=parseFloat(v)||0;
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function haiku(ms){if(window.navigator&&navigator.vibrate)navigator.vibrate(ms||10);}
function toast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:8px 18px;border-radius:20px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(function(){t.style.opacity='0';},2000);
}
function tagColor(name){
  var t=TAG_PRESETS.find(function(p){return p.name===name;});
  return t?t.color:'#636366';
}

// ═══════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════
function save(){
  try{localStorage.setItem('ff-data',JSON.stringify(D));}catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem('ff-data');
    if(raw){var p=JSON.parse(raw);Object.assign(D,p);}
  }catch(e){}
}
function exportBackup(){
  var blob=new Blob([JSON.stringify({D:D,S:S,v:1,ts:new Date().toISOString()},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='focusflow-backup-'+td0()+'.json';a.click();
}
function importBackup(json){
  try{
    var p=JSON.parse(json);
    if(p.D)Object.assign(D,p.D);
    save();render(S.page);toast('Backup importado ✓');
  }catch(e){toast('Erro ao importar');}
}

// ═══════════════════════════════════════
//  DARK MODE
// ═══════════════════════════════════════
function applyDark(v){
  var root=document.documentElement;
  if(v==='1'){root.setAttribute('data-dark','1');}
  else if(v==='0'){root.removeAttribute('data-dark');}
  else{
    var sys=window.matchMedia('(prefers-color-scheme:dark)').matches;
    if(sys)root.setAttribute('data-dark','1');else root.removeAttribute('data-dark');
  }
}
// Live OS dark mode listener
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
  var pref=localStorage.getItem('ff-dark')||'auto';
  if(pref==='auto'){applyDark('auto');updateDarkIcon();}
});
function toggleDark(){
  var isDark=document.documentElement.getAttribute('data-dark')==='1';
  var next=isDark?'0':'1';
  localStorage.setItem('ff-dark',next);
  applyDark(next);
  updateDarkIcon();
  // Sync settings toggle if open
  var tog=document.getElementById('dark-tog');
  if(tog)tog.checked=!isDark;
}
function updateDarkIcon(){
  var btn=document.getElementById('dark-btn');
  if(!btn)return;
  var isDark=document.documentElement.getAttribute('data-dark')==='1';
  btn.innerHTML=isDark
    ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function goPage(pg,push){
  S.prevPage=S.page;S.page=pg;
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('on');});
  var p=document.getElementById('p-'+pg);
  if(p)p.classList.add('on');
  updateNavBubble();
  render(pg);
  if(push)window.history.pushState({pg:pg},'','');
}
function updateNavBubble(){
  var pg=S.page;
  document.querySelectorAll('.nb').forEach(function(b){
    b.classList.toggle('on', b.dataset.pg===pg);
  });
  // Update bubble position
  var onBtn=document.querySelector('.nb.on');
  var bubble=document.getElementById('nav-bubble');
  if(onBtn&&bubble){
    var pr=onBtn.parentElement.getBoundingClientRect();
    var br=onBtn.getBoundingClientRect();
    bubble.style.transform='translateX('+(br.left-pr.left+br.width/2-bubble.offsetWidth/2)+'px)';
  }
}
function render(pg){
  var el=document.getElementById('inicio-feed');
  if(pg==='inicio'&&el)renderInicio();
  else if(pg==='hoje'){var eh=document.getElementById('hoje-feed');if(eh)renderHoje();}
  else if(pg==='entrada'){renderEntrada();}
  else if(pg==='projetos'){renderProjetos();}
  else if(pg==='notas'){renderNotas();}
  else if(pg==='navegar'){renderNavegar();}
  updateDarkIcon();
  updateHdrDate();
}

function updateHdrDate(){
  var el=document.getElementById('hdr-date');
  if(!el)return;
  var now=new Date();
  var months=['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];

}

// ═══════════════════════════════════════
//  DATA QUERIES
// ═══════════════════════════════════════
function getForDate(ds){
  var a=[];
  D.tasks.forEach(function(t){if(t.dueDate===ds&&!t.done)a.push({kind:'task',data:t,date:ds});});
  D.reminders.forEach(function(r){if(r.datetime&&r.datetime.slice(0,10)===ds&&!r.done)a.push({kind:'reminder',data:r,date:ds});});
  D.events.forEach(function(e){if(e.date===ds)a.push({kind:'event',data:e,date:ds});});
  return a;
}
function getAllUpcoming(){
  var today=td0();
  var a=[];
  D.tasks.forEach(function(t){if(!t.done&&t.dueDate&&t.dueDate>=today)a.push({kind:'task',data:t,date:t.dueDate});});
  D.reminders.forEach(function(r){if(!r.done&&r.datetime){var d=r.datetime.slice(0,10);if(d>=today)a.push({kind:'reminder',data:r,date:d});}});
  D.events.forEach(function(e){if(e.date>=today)a.push({kind:'event',data:e,date:e.date});});
  a.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  return a;
}
function getOverdue(){
  var today=td0();
  var a=[];
  D.tasks.forEach(function(t){if(!t.done&&t.dueDate&&t.dueDate<today)a.push({kind:'task',data:t,date:t.dueDate});});
  D.reminders.forEach(function(r){if(!r.done&&r.datetime){var d=r.datetime.slice(0,10);if(d<today)a.push({kind:'reminder',data:r,date:d});}});
  return a;
}

  var el=document.getElementById('inicio-feed');
  if(!el)return;
  el.innerHTML='';
  var today=td0();

  // Weekly calendar
  buildWeekCal(el);

  // Overdue section
  var overdue=getOverdue();

  ovSec.style.cssText='padding:8px 16px 4px;display:flex;align-items:center;justify-content:space-between';

  el.appendChild(emSec);

  var upcoming=getAllUpcoming().filter(function(item){

  // Limit to 14 days unless user expanded
  var cutoff=addDays(td0(), S._showAll ? 365 : 14);
  var byDate={};
  upcoming.forEach(function(item){
    if(!S._showAll && item.date > cutoff) return;
    if(!byDate[item.date])byDate[item.date]=[];
    byDate[item.date].push(item);
  });
  var dates=Object.keys(byDate).sort();
  if(dates.length===0){
    var em=document.createElement('div');
    em.style.cssText='padding:20px 16px;text-align:center;color:var(--sub);font-size:14px';
    em.textContent='Nada programado ✓';
    el.appendChild(em);

  dates.forEach(function(ds){

    banner.className='date-banner';
    banner.dataset.date=ds;
    var dow=WSHORT[new Date(ds+'T12:00').getDay()];

    var card=document.createElement('div');card.className='card fade-in';card.style.margin='0 16px 8px';

    recentNotes.forEach(function(note){

      row.onclick=function(){openNoteEditor(note);};
      var ico=document.createElement('div');
      ico.style.cssText='width:36px;height:36px;border-radius:10px;background:rgba(255,204,0,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0';
      ico.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';

      row.appendChild(ico);row.appendChild(info);

    });
    el.appendChild(nCard);
  }

  // ── Projetos em andamento ──
  var activeProjs=D.projects.slice(0,5);
  if(activeProjs.length){
    var pSec=document.createElement('div');pSec.className='sec';
    pSec.innerHTML='<div class="sec-t"><b>📁 Projetos</b></div><button onclick="goPage(\"projetos\")" style="border:none;background:transparent;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer">Ver todos</button>';

      var card=document.createElement('div');
      card.className='card';card.style.cssText='margin:0 16px 8px;cursor:pointer;padding:14px 16px';
      card.onclick=function(){openProjectEditor(proj);};
      var tasks=D.tasks.filter(function(t){return t.projectId===proj.id;});
      var done=tasks.filter(function(t){return t.done;}).length;
      var pct=tasks.length?Math.round(done/tasks.length*100):0;
      var color=proj.color||'#007AFF';
      card.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
        +'<div style="width:10px;height:10px;border-radius:50%;background:'+color+';flex-shrink:0"></div>'
        +'<b style="font-size:15px;flex:1;color:var(--fg)">'+esc(proj.title)+'</b>'
        +'<span style="font-size:12px;color:var(--sub)">'+done+'/'+tasks.length+'</span></div>'
        +'<div style="background:var(--line);border-radius:4px;height:3px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:4px"></div></div>';
      el.appendChild(card);
    });
  }

  // AutoGest Financeiro
  var agEl=document.createElement('div');

function renderHoje(){
  var el=document.getElementById('hoje-feed');
  if(!el)return;
  el.innerHTML='';
  var today=td0();
  var items=getForDate(today);
  if(!items.length){
    el.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--sub)">Nada para hoje ✓</div>';
    return;
  }
  var card=document.createElement('div');card.className='card';card.style.margin='0 16px';
  items.forEach(function(item){card.appendChild(buildItemRow(item));});
  el.appendChild(card);
}

// ═══════════════════════════════════════
//  RENDER ENTRADA
// ═══════════════════════════════════════
function renderEntrada(){
  var el=document.getElementById('entrada-feed');
  if(!el)return;
  el.innerHTML='';
  var chipRow=document.getElementById('entrada-chips');
  if(chipRow){
    chipRow.innerHTML='';
    ['Todas','Hoje','Atrasadas','Concluídas'].forEach(function(label,i){
      var filter=['all','today','late','done'][i];
      var btn=document.createElement('button');
      btn.className='chip'+((!S._entFilter||S._entFilter==='all')&&filter==='all'?'on':S._entFilter===filter?'on':'');
      btn.textContent=label;
      btn.onclick=function(){S._entFilter=filter;renderEntrada();};
      chipRow.appendChild(btn);
    });
  }
  var today=td0();
  var filter=S._entFilter||'all';
  var tasks=D.tasks.filter(function(t){
    if(filter==='today')return !t.done&&t.dueDate===today;
    if(filter==='late')return !t.done&&t.dueDate&&t.dueDate<today;
    if(filter==='done')return t.done;
    return !t.done;
  });
  tasks.sort(function(a,b){var da=a.dueDate||'9999',db=b.dueDate||'9999';return da<db?-1:da>db?1:0;});
  if(!tasks.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--sub)">Nenhuma tarefa ✓</div>';return;}
  var card=document.createElement('div');card.className='card';card.style.margin='0 16px';
  tasks.forEach(function(t){
    var item={kind:'task',data:t,date:t.dueDate||''};
    var row=buildItemRow(item);
    // Drag handle
    var handle=document.createElement('div');
    handle.style.cssText='padding:0 6px 0 0;cursor:grab;color:#c7c7cc;display:flex;align-items:center;flex-shrink:0;touch-action:none';
    handle.innerHTML='<svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor"><circle cx="3" cy="3" r="1.5"/><circle cx="9" cy="3" r="1.5"/><circle cx="3" cy="9" r="1.5"/><circle cx="9" cy="9" r="1.5"/><circle cx="3" cy="15" r="1.5"/><circle cx="9" cy="15" r="1.5"/></svg>';
    row.insertBefore(handle,row.firstChild);
    row.setAttribute('draggable','true');
    row._taskRef=t;
    row.addEventListener('dragstart',function(e){window._dragTask=t;row.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',function(){row.style.opacity='';});
    row.addEventListener('dragover',function(e){e.preventDefault();row.style.background='rgba(0,122,255,.06)';});
    row.addEventListener('dragleave',function(){row.style.background='';});
    row.addEventListener('drop',function(e){
      e.stopPropagation();row.style.background='';
      var src=window._dragTask;if(!src||src===t)return;
      var si=D.tasks.indexOf(src),ti=D.tasks.indexOf(t);
      if(si>=0&&ti>=0){D.tasks.splice(si,1);D.tasks.splice(ti,0,src);save();renderEntrada();}
    });
    card.appendChild(row);
  });
  el.appendChild(card);
}

  D.projects.forEach(function(proj){
    var card=document.createElement('div');

      +'<span style="font-size:12px;color:var(--sub)">'+done+'/'+tasks.length+'</span></div>'
      +(proj.desc?'<div style="font-size:13px;color:var(--sub);margin-bottom:8px">'+esc(proj.desc)+'</div>':'')
      +'<div style="background:var(--line);border-radius:4px;height:4px;overflow:hidden">'
      +'<div style="width:'+pct+'%;height:100%;background:'+(proj.color||'var(--blue)')+';border-radius:4px;transition:width .3s"></div></div>';
    el.appendChild(card);
  });
}

function renderNotas(){

function buildWeekCal(el){
  var today=td0();
  var selDate=S.selDate||today;
  var ws=weekStart(selDate);

  var wrap=document.createElement('div');
  wrap.className='week-cal';

  // Days row — no arrows, swipeable
  var row=document.createElement('div');
  row.className='wdays';

  for(var i=0;i<7;i++){
    var ds=addDays(ws,i);
    var day=new Date(ds+'T12:00');
    var isT=ds===today, isSel=ds===selDate;
    var has=getForDate(ds).length>0;
    var div=document.createElement('div');
    div.className='wday'+(isT?' is-today':'')+(isSel&&!isT?' is-sel':'');
    div.innerHTML='<div class="wday-l">'+WSHORT[day.getDay()]+'</div>'
      +'<div class="wday-n">'+day.getDate()+'</div>'
      +(has?'<div class="wday-dot"></div>':'<div style="height:4px"></div>');
    div.addEventListener('click',(function(d){return function(){
      S.selDate=d;
      renderInicio();
      setTimeout(function(){scrollToDate(d);},80);
    };})(ds));
    row.appendChild(div);
  }
  wrap.appendChild(row);

  // Horizontal swipe to change week
  var swX=null;
  wrap.addEventListener('touchstart',function(e){swX=e.touches[0].clientX;},{passive:true});
  wrap.addEventListener('touchend',function(e){
    if(swX===null)return;
    var dx=e.changedTouches[0].clientX-swX;
    if(Math.abs(dx)>50){if(dx<0)nextWeek();else prevWeek();}
    swX=null;
  },{passive:true});

  el.appendChild(wrap);
}

function addDragToRow(row, item, kind){
  var longTimer=null, dragging=false, clone=null;
  var startY=0, startX=0;

  row.addEventListener('touchstart',function(e){
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    longTimer=setTimeout(function(){
      dragging=true;
      haiku(40);
      row.style.opacity='.5';
      row.style.transform='scale(1.03)';
      row.style.boxShadow='0 8px 24px rgba(0,0,0,.18)';
      row.style.zIndex='100';
      row.style.position='relative';
    },500);
  },{passive:true});

  row.addEventListener('touchmove',function(e){
    var dy=e.touches[0].clientY-startY;
    var dx=e.touches[0].clientX-startX;
    if(!dragging){
      // Cancel long press if moved too much
      if(Math.abs(dy)>10||Math.abs(dx)>10){clearTimeout(longTimer);longTimer=null;}
      return;
    }
    e.preventDefault();
    row.style.transform='scale(1.03) translateY('+dy+'px)';
    // Find element under finger
    row.style.pointerEvents='none';
    var el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
    row.style.pointerEvents='';
    if(el){
      var target=el.closest('.irow');
      if(target&&target!==row){
        // Highlight drop target
        document.querySelectorAll('.irow.drop-target').forEach(function(r){r.classList.remove('drop-target');});
        target.classList.add('drop-target');
      }
    }
  },{passive:false});

  row.addEventListener('touchend',function(e){
    clearTimeout(longTimer);
    if(!dragging){row.style.opacity='';row.style.transform='';row.style.boxShadow='';row.style.zIndex='';row.style.position='';return;}
    dragging=false;
    row.style.opacity='';row.style.transform='';row.style.boxShadow='';row.style.zIndex='';row.style.position='';
    // Find drop target
    var target=document.querySelector('.irow.drop-target');
    document.querySelectorAll('.irow.drop-target').forEach(function(r){r.classList.remove('drop-target');});
    if(!target||target===row)return;
    // Move in data
    var targetDate=target._dateRef||null;
    var targetBanner=target.closest('.card');
    if(targetBanner){
      // Find date from banner above this card
      var prev=targetBanner.previousElementSibling;
      while(prev&&!prev.dataset.date)prev=prev.previousElementSibling;
      if(prev&&prev.dataset.date)targetDate=prev.dataset.date;
    }
    if(targetDate&&item){
      item.dueDate=targetDate;
      save();renderInicio();
      haiku(20);
      toast('Movido para '+fmtD(targetDate));
    }
  },{passive:true});
}

// ═══════════════════════════════════════
//  SWIPE GESTURES
// ═══════════════════════════════════════
function addSwipe(el,onDone,onDel){
  var sx,sy,dx=0,state='idle',THR=72;
  el.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;state='idle';
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(state==='v-locked')return;
    var cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    dx=cx-sx;var dy=cy-sy;
    if(state==='idle'){
      if(Math.abs(dx)>18||Math.abs(dy)>18){
        // Only lock horizontal if clearly more horizontal than vertical
        state=Math.abs(dx)>Math.abs(dy)*1.5?'h-locked':'v-locked';
      }
    }
    if(state==='h-locked'){
      e.preventDefault();
      el.style.transform='translateX('+dx+'px)';
      el.style.transition='none';
      // Only show color feedback after significant swipe (32px)
      if(Math.abs(dx)>32){
        if(dx>0)el.style.background='rgba(52,199,89,.12)';
        else el.style.background='rgba(255,59,48,.08)';
      } else {
        el.style.background='';
      }
    }
  },{passive:false});
  el.addEventListener('touchend',function(){
    el.style.transition='transform .25s,background .25s';
    if(state==='h-locked'){
      if(dx>THR){el.style.transform='translateX(120%)';setTimeout(function(){onDone&&onDone();},200);}
      else if(dx<-THR){el.style.transform='translateX(-120%)';setTimeout(function(){onDel&&onDel();},200);}
      else{el.style.transform='';el.style.background='';}
    }
    dx=0;state='idle';
  });
}

function syncTaskFields(){
  var ti=document.getElementById('t-ti');if(ti)_curT.title=ti.value;
  var no=document.getElementById('t-no');if(no)_curT.notes=no.value;
  var dt=document.getElementById('t-dt');if(dt)_curT.dueDate=dt.value;
  var hr=document.getElementById('t-hr');if(hr)_curT.dueTime=hr.value;
  var rc=document.getElementById('t-rc');if(rc)_curT.recurrence=rc.value;
  var lk=document.getElementById('t-lk');if(lk)_curT.link=lk.value;
  var loc=document.getElementById('t-loc');if(loc)_curT.location=loc.value;
  var nd=document.getElementById('t-notif-date');var nt=document.getElementById('t-notif-time');
  if(nd&&nt&&nd.value)_curT.notifyAt=nd.value+'T'+nt.value;
  var nd2=document.getElementById('t-notif2-date');var nt2=document.getElementById('t-notif2-time');
  if(nd2&&nt2&&nd2.value)_curT.notifyAt2=nd2.value+'T'+nt2.value;
}
function saveTask(){
  syncTaskFields();
  var ti=_curT.title;if(!ti||!ti.trim())return;
  if(S.eTask){Object.assign(S.eTask,_curT);}
  else{_curT.id=uid();_curT.done=false;_curT.createdAt=new Date().toISOString();
    if(_curT.dueDate&&!_curT._originalDueDate)_curT._originalDueDate=_curT.dueDate;
    D.tasks.unshift(_curT);}
  save();
  // Schedule notifications
  if(_curT.notifyAt)scheduleNotif(_curT.title,_curT.notes||'Tarefa no FocusFlow',_curT.notifyAt);
  if(_curT.notifyAt2)scheduleNotif(_curT.title,_curT.notes||'Tarefa no FocusFlow',_curT.notifyAt2);
  closeModal();render(S.page);toast('Salvo ✓');
}
function deleteTask(){if(S.eTask){D.tasks=D.tasks.filter(function(t){return t!==S.eTask;});save();closeModal();render(S.page);toast('Excluído');}}
function deleteTaskItem(d){D.tasks=D.tasks.filter(function(t){return t!==d;});save();render(S.page);}
function setPri(v){syncTaskFields();_curT.priority=v;window._taskRender&&window._taskRender();}
function setDate(v){syncTaskFields();_curT.dueDate=v;window._taskRender&&window._taskRender();}
function toggleTag(btn){
  var name;
  if(typeof btn==='string'){name=btn;}
  else{name=btn.getAttribute('data-tag')||btn.textContent;}
  syncTaskFields();
  var tags=_curT.tags||[];
  var i=tags.indexOf(name);
  if(i>=0)tags.splice(i,1);else tags.push(name);
  _curT.tags=tags;window._taskRender&&window._taskRender();
}
function addSub(){
  syncTaskFields();
  var inp=document.getElementById('sub-i');
  if(!inp||!inp.value.trim())return;
  if(!_curT.subtasks)_curT.subtasks=[];
  _curT.subtasks.push({id:uid(),title:inp.value.trim(),done:false});
  window._taskRender&&window._taskRender();
}
function delSub(i){syncTaskFields();_curT.subtasks.splice(i,1);window._taskRender&&window._taskRender();}
function toggleSub(i){syncTaskFields();_curT.subtasks[i].done=!_curT.subtasks[i].done;window._taskRender&&window._taskRender();}
function getGPS(){
  if(!navigator.geolocation){toast('GPS não disponível');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var loc=pos.coords.latitude.toFixed(4)+', '+pos.coords.longitude.toFixed(4);
    var el=document.getElementById('t-loc');if(el)el.value=loc;
  });
}
function toggleNotifSec(){
  syncTaskFields();
  if(_curT.notifyAt){_curT.notifyAt='';}
  else{_curT.notifyAt=(_curT.dueDate||td0())+'T09:00';}
  window._taskRender&&window._taskRender();
}
function toggleNotif2Sec(){
  syncTaskFields();
  if(_curT.notifyAt2){_curT.notifyAt2='';}
  else{_curT.notifyAt2=(_curT.dueDate||td0())+'T09:00';}
  window._taskRender&&window._taskRender();
}
function setNotifPresetN(n,mins){
  syncTaskFields();
  var base=_curT.dueDate||td0();var time=_curT.dueTime||'09:00';
  var dt=new Date(base+'T'+time);dt.setMinutes(dt.getMinutes()-mins);
  var val=dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate())+'T'+p2(dt.getHours())+':'+p2(dt.getMinutes());
  if(n===1){_curT.notifyAt=val;var di=document.getElementById('t-notif-date');var ti=document.getElementById('t-notif-time');if(di)di.value=val.slice(0,10);if(ti)ti.value=val.slice(11,16);}
  else{_curT.notifyAt2=val;var di2=document.getElementById('t-notif2-date');var ti2=document.getElementById('t-notif2-time');if(di2)di2.value=val.slice(0,10);if(ti2)ti2.value=val.slice(11,16);}

function scheduleNotif(title,body,dtStr){
  var dt=new Date(dtStr);
  var now=new Date();
  var delay=dt-now;
  if(delay<=0)return;
  if(delay>7*24*60*60*1000)return; // max 7 days ahead

  // Method 1: Web Notifications API (works on desktop/Android, NOT iOS Safari)
  if('Notification' in window&&Notification.permission==='granted'){
    setTimeout(function(){
      try{new Notification(title,{body:body||'FocusFlow',silent:false});}catch(e){}
    },delay);
  }
  // Method 2: In-app banner (always works, even on iOS)
  setTimeout(function(){showNotifBanner(title,body);},delay);
  // Store for persistence across refreshes
  var stored=JSON.parse(localStorage.getItem('ff-notifs')||'[]');
  stored.push({title:title,body:body,at:dt.toISOString()});
  // Keep only future notifs
  stored=stored.filter(function(n){return new Date(n.at)>new Date();});
  localStorage.setItem('ff-notifs',JSON.stringify(stored.slice(0,20)));
}

function showNotifBanner(title,body){
  haiku(100);
  // Also try native notification if allowed
  if('Notification' in window&&Notification.permission==='granted'){try{new Notification(title,{body:body||'FocusFlow'});}catch(e){}}
  var banner=document.createElement('div');
  banner.style.cssText='position:fixed;top:calc(env(safe-area-inset-top,44px)+8px);left:12px;right:12px;'
    +'z-index:9999;background:#1c1c1e;color:#fff;border-radius:16px;padding:14px 18px;'
    +'box-shadow:0 4px 24px rgba(0,0,0,.35);display:flex;align-items:flex-start;gap:12px;'
    +'animation:slideInBanner .3s cubic-bezier(.34,1.56,.64,1)';
  banner.innerHTML='<div style="width:36px;height:36px;border-radius:10px;background:#007AFF;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
    +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>'
    +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px">'+esc(title)+'</div>'
    +(body?'<div style="font-size:13px;opacity:.75;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(body)+'</div>':'')

// Check pending notifs on load
function checkPendingNotifs(){
  var now=new Date();
  var maxDelay=7*24*60*60*1000;

  // Scan all tasks with notifyAt
  D.tasks.forEach(function(t){
    if(t.done)return;
    [t.notifyAt,t.notifyAt2].forEach(function(at){
      if(!at)return;
      var dt=new Date(at);
      var delay=dt-now;
      if(delay>0&&delay<maxDelay){
        (function(title,body,d){
          setTimeout(function(){showNotifBanner(title,body);},d);
        })(t.title,t.notes||'Tarefa',delay);
      }
    });
  });

  // Scan all reminders
  D.reminders.forEach(function(r){
    if(r.done)return;
    if(!r.datetime)return;
    var dt=new Date(r.datetime);
    var delay=dt-now;
    if(delay>0&&delay<maxDelay){
      (function(title,body,d){
        setTimeout(function(){showNotifBanner(title,body);},d);
      })(r.title,r.notes||'Lembrete',delay);
    }
  });

  // Also from localStorage (legacy)
  var stored=JSON.parse(localStorage.getItem('ff-notifs')||'[]');
  var future=[];
  stored.forEach(function(n){
    var dt=new Date(n.at);var delay=dt-now;
    if(delay>0&&delay<maxDelay){
      setTimeout(function(){showNotifBanner(n.title,n.body);},delay);
      future.push(n);
    }
  });
  localStorage.setItem('ff-notifs',JSON.stringify(future));
}

function doSearch(q){
  var res=document.getElementById('s-res');
  if(!res)return;
  q=(q||'').toLowerCase().trim();
  if(!q){res.innerHTML='';return;}
  var results=[];
  D.tasks.forEach(function(t){if((t.title+' '+(t.notes||'')).toLowerCase().includes(q))results.push({kind:'task',data:t,date:t.dueDate||''});});
  D.reminders.forEach(function(r){if((r.title+' '+(r.notes||'')).toLowerCase().includes(q))results.push({kind:'reminder',data:r,date:r.datetime?r.datetime.slice(0,10):''});});
  D.events.forEach(function(e){if((e.title+' '+(e.desc||'')).toLowerCase().includes(q))results.push({kind:'event',data:e,date:e.date||''});});
  D.notes.forEach(function(n){if((n.title+' '+(n.body||'')).toLowerCase().includes(q)){
    var card=document.createElement('div');card.className='card';card.style.cssText='margin:0 16px 8px;cursor:pointer;padding:14px';
    card.innerHTML='<b>'+esc(n.title)+'</b><p style="font-size:13px;color:var(--sub);margin:4px 0 0">'+esc((n.body||'').slice(0,80))+'</p>';
    card.onclick=function(){closeSearch();openNoteEditor(n);};
    results.push({kind:'note',el:card});
  }});
  res.innerHTML='';
  if(!results.length){res.innerHTML='<div style="padding:20px;text-align:center;color:var(--sub)">Nenhum resultado</div>';return;}
  var card=document.createElement('div');card.className='card';card.style.margin='0 16px';
  results.forEach(function(item){
    if(item.kind==='note'){res.appendChild(item.el);}
    else{card.appendChild(buildItemRow(item));}
  });
  if(card.children.length)res.appendChild(card);
}

var AG_DATA={loaded:false,loading:false,despesas:[],orcamento:[],contas:[],_rawDesp:[],_rawOrc:[],lastSync:null};

function loadAutoGestData(cb){
  if(AG_DATA.loading)return;
  var origin=window.location.origin||'';
  // Always attempt - Supabase anon key works from any origin
  // Only block from file:// protocol
  AG_DATA.loading=true;
  Promise.all([
    AG.get('despesas',''),
    AG.get('orcamento_pessoal',''),
    AG.get('orcamento_pessoal','tipo=eq.despesa'),
    AG.get('orcamento_pessoal','status=eq.previsto'),
    AG.get('contas','tipo=eq.pagar')
  ]).then(function(res){
    var rawDesp=res[0]||[];
    var orcCandidates=[res[1]||[],res[2]||[],res[3]||[]];
    orcCandidates.sort(function(a,b){return b.length-a.length;});
    var rawOrc=orcCandidates[0];
    var orcById={};rawOrc.forEach(function(o){if(o.id)orcById[o.id]=o;});
    rawOrc=Object.keys(orcById).map(function(k){return orcById[k];});
    var rawContas=res[4]||[];
    AG_DATA._rawDesp=rawDesp;AG_DATA._rawOrc=rawOrc;
    function norm(arr){
      return arr.map(function(item){
        var d=item.dataprevista||item.vencimento||item.data||item.dt||item.data_vencimento||item.competencia||item.mes||'';
        if(d&&d.length>10)d=d.slice(0,10);
        if(d&&d.length===7)d=d+'-28';
        item._data=d;return item;
      });
    }
    AG_DATA.despesas=norm(rawDesp).filter(function(d){
      if(d.datapagamento&&String(d.datapagamento).trim()!='')return false;
      var s=String(d.status||'').toLowerCase();
      return s!='pago'&&s!='baixado'&&s!='recebido'&&s!='quitado'&&s!='cancelado';
    });
    var orcTemp=norm(rawOrc).filter(function(o){
      if(String(o.tipo||'').toLowerCase()==='receita')return false;
      var bx=o.databaixa;if(bx&&String(bx).trim()!==''&&String(bx)!=='null'&&bx!==null)return false;
      var s=String(o.status||'').toLowerCase();
      if(s==='pago'||s==='baixado'||s==='recebido'||s==='quitado'||s==='cancelado')return false;
      return true;
    });
    AG_DATA.orcamento=orcTemp.length>0?orcTemp:norm(rawOrc).filter(function(o){return String(o.tipo||'').toLowerCase()!=='receita';});
    AG_DATA.contas=norm(rawContas).filter(function(c){
      if(c.datapagamento&&String(c.datapagamento).trim()!='')return false;
      var s=String(c.status||'').toLowerCase();
      return s!='pago'&&s!='baixado'&&s!='quitado'&&s!='cancelado';
    });
    AG_DATA.loaded=true;AG_DATA.loading=false;AG_DATA.lastSync=new Date();
    _autoImportar();if(cb)cb();
  }).catch(function(e){AG_DATA.loading=false;if(cb)cb();});
}

function _autoImportar(){
  var today=td0();
  var all=[];
  AG_DATA.despesas.forEach(function(d){all.push({item:d,tipo:'despesa'});});
  AG_DATA.orcamento.forEach(function(o){all.push({item:o,tipo:'orcamento'});});
  (AG_DATA.contas||[]).forEach(function(c){all.push({item:c,tipo:'conta'});});
  all.forEach(function(x){
    var d=x.item;
    var exists=D.tasks.some(function(t){return t.agRef&&t.agRef.id===d.id&&t.agRef.tipo===x.tipo;});
    if(exists)return;
    var title=d.descricao||d.nome||d.description||'Despesa';
    var dueDate=d._data||'';
    if(!dueDate&&(String(d.status||'').toLowerCase()==='atrasado'||String(d.status||'').toLowerCase()==='vencido')){dueDate=addDays(today,-1);}
    var task={id:uid(),title:title,done:false,dueDate:dueDate,dueTime:'',
      notes:'R$ '+parseFloat(d.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+(d.categoria?' · '+d.categoria:''),
      priority:'none',recurrence:'none',subtasks:[],tags:['Financeiro','AutoGest'],
      agRef:{id:d.id,tipo:x.tipo},createdAt:new Date().toISOString()};
    D.tasks.push(task);
  });
  save();
}

      var dt=new Date(base+'T'+time);dt.setMinutes(dt.getMinutes()-mins);
      notifyAt=dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate())+'T'+p2(dt.getHours())+':'+p2(dt.getMinutes());
    }
    flow.data.notifyAt=notifyAt;flow.step='confirm';
    var label={task:'Tarefa',event:'Evento',reminder:'Lembrete'}[flow.type];
    var summary='📋 **Resumo:**\nNome: **'+flow.data.title+'**\n'+(flow.data.date?'Data: **'+fmtD(flow.data.date)+'**\n':'')+(flow.data.time?'Hora: **'+flow.data.time+'**\n':'')+(notifyAt?'Notificação configurada\n':'')+'Criar '+label.toLowerCase()+'?';
    _addClaudeMsg('ai',summary);
    _addQuickActions([{icon:'✅',label:'Criar',fn:'aiConfirm'},{icon:'✏️',label:'Editar',fn:'aiEdit'},{icon:'✕',label:'Cancelar',fn:'aiCancel'}]);
    return true;
  }
  return false;
}

function parseNaturalDate(txt){
  if(!txt||txt.toLowerCase()==='não'||txt.toLowerCase()==='nao'||txt.trim()==='')return '';
  var l=txt.toLowerCase();
  if(l==='hoje')return td0();
  if(l==='amanhã'||l==='amanha')return addDays(td0(),1);
  if(l==='depois de amanhã'||l==='depois de amanha')return addDays(td0(),2);
  var m=txt.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if(m){var y=m[3]?parseInt(m[3])+(m[3].length===2?2000:0):new Date().getFullYear();return y+'-'+p2(parseInt(m[2]))+'-'+p2(parseInt(m[1]));}
  return '';
}

function handleRecurrence(task){
  if(!task.recurrence||task.recurrence==='none'||!task.dueDate)return;
  // Always use original dueDate (not completion date) for next occurrence
  var base=task._originalDueDate||task.dueDate;
  var next=base;
  if(task.recurrence==='daily')next=addDays(base,1);
  else if(task.recurrence==='weekly')next=addDays(base,7);
  else if(task.recurrence==='monthly'){var d=new Date(base+'T12:00');d.setMonth(d.getMonth()+1);next=iso(d);}
  else if(task.recurrence==='yearly'){var d2=new Date(base+'T12:00');d2.setFullYear(d2.getFullYear()+1);next=iso(d2);}
  var newTask=JSON.parse(JSON.stringify(task));
  newTask.id=uid();newTask.done=false;newTask.dueDate=next;
  newTask._originalDueDate=next; // preserve for future recurrences
  newTask.createdAt=new Date().toISOString();
  D.tasks.push(newTask);
}

var _dragItem=null,_dragOverItem=null,_dragList=null;

function enableDrag(row,item,list){
  row.setAttribute('draggable','true');

  // Drag events (desktop)
  row.addEventListener('dragstart',function(e){
    _dragItem=item;_dragList=list;
    row.style.opacity='.4';
    e.dataTransfer.effectAllowed='move';
  });
  row.addEventListener('dragend',function(){row.style.opacity='1';});
  row.addEventListener('dragover',function(e){
    e.preventDefault();
    _dragOverItem=item;
    row.style.borderTop='2px solid var(--blue)';
  });
  row.addEventListener('dragleave',function(){row.style.borderTop='';});
  row.addEventListener('drop',function(e){
    e.preventDefault();row.style.borderTop='';
    if(!_dragItem||_dragItem===_dragOverItem||!_dragList)return;
    var from=_dragList.indexOf(_dragItem);
    var to=_dragList.indexOf(_dragOverItem);
    if(from<0||to<0)return;
    _dragList.splice(from,1);
    _dragList.splice(to,0,_dragItem);
    save();render(S.page);
    _dragItem=null;_dragOverItem=null;
  });

  // Long-press (mobile)
  var pressTimer=null,startX,startY;
  row.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;
    pressTimer=setTimeout(function(){
      haiku(40);
      row.style.transform='scale(1.03)';
      row.style.boxShadow='0 8px 24px rgba(0,0,0,.15)';
      row.style.zIndex='100';
      row.style.transition='transform .15s,box-shadow .15s';
      _dragItem=item;_dragList=list;
      // Show move UI
      showMoveSheet(item,list);
    },500);
  },{passive:true});
  row.addEventListener('touchmove',function(e){
    var dx=Math.abs(e.touches[0].clientX-startX);
    var dy=Math.abs(e.touches[0].clientY-startY);
    if(dx>10||dy>10){clearTimeout(pressTimer);pressTimer=null;}
  },{passive:true});
  row.addEventListener('touchend',function(){
    clearTimeout(pressTimer);pressTimer=null;
    row.style.transform='';row.style.boxShadow='';row.style.zIndex='';
  },{passive:true});
}

function moveItemToDate(when){
  if(!_dragItem)return;
  if(when==='today')_dragItem.dueDate=td0();
  else if(when==='tomorrow')_dragItem.dueDate=addDays(td0(),1);
  else if(when==='week')_dragItem.dueDate=addDays(td0(),7);
  else if(when==='clear')_dragItem.dueDate='';

  _dragItem=null;toast('Movido \u2713');
}
