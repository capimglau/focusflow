<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>FocusFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES — LIGHT
══════════════════════════════════════ */
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--card2:#F2F2F7;--fg:#000000;--sub:#8E8E93;
  --sep:rgba(0,0,0,.06);--line:rgba(0,0,0,.09);--shadow:rgba(0,0,0,.06);
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;
  --purple:#AF52DE;--teal:#5AC8FA;--pink:#FF2D55;--yellow:#FFCC00;
  --chk:#C7C7CC;--nav-bg:rgba(255,255,255,.72);--nav-active:rgba(255,255,255,.9);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
/* ── DARK MODE ── */
[data-dark="1"]{
  --bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;--fg:#FFFFFF;--sub:#8E8E93;
  --sep:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--shadow:rgba(0,0,0,.3);
  --chk:#48484A;--nav-bg:rgba(28,28,30,.85);--nav-active:rgba(58,58,60,.95);
}
@media(prefers-color-scheme:dark){
  :root:not([data-dark="0"]){
    --bg:#000000;--card:#1C1C1E;--card2:#2C2C2E;--fg:#FFFFFF;--sub:#8E8E93;
    --sep:rgba(255,255,255,.08);--line:rgba(255,255,255,.12);--shadow:rgba(0,0,0,.3);
    --chk:#48484A;--nav-bg:rgba(28,28,30,.85);--nav-active:rgba(58,58,60,.95);
  }
}
/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100dvh;height:-webkit-fill-available;overflow:hidden;overscroll-behavior:none;background:var(--bg)}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--fg);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;transition:background .25s,color .25s}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding-bottom:100px;display:none;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--st)+8px)}
.page.active{display:block}
@keyframes slideInR{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInL{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page.anim-r{animation:slideInR .22s cubic-bezier(.25,1,.5,1)}
.page.anim-l{animation:slideInL .22s cubic-bezier(.25,1,.5,1)}
.page.anim-f{animation:fadeIn .18s ease}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.hdr{padding:2px 20px 6px;display:flex;align-items:flex-end;justify-content:space-between}
.hdr-left h1{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.15;color:var(--fg)}
.hdr-left small{font-size:12px;color:var(--sub);display:block;margin-bottom:1px}
.hdr-act{display:flex;gap:3px;align-items:center;padding-bottom:2px}
.hdr-btn{border:none;background:transparent;cursor:pointer;padding:7px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;transition:background .12s;color:var(--sub)}
.hdr-btn:active{background:var(--sep)}
.hdr-btn.blue{color:var(--blue)}

/* ══════════════════════════════════════
   WEEK STRIP
══════════════════════════════════════ */
.week-wrap{display:flex;align-items:center;padding:0 12px 6px;gap:0}
.w-arr{border:none;background:transparent;cursor:pointer;color:var(--sub);
  font-size:24px;padding:2px 6px;line-height:1;flex-shrink:0}
.wdays{flex:1;display:flex;justify-content:space-between}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:3px 1px;border-radius:10px;min-width:0}
.wday-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.1px;font-weight:500}
.wday-n{font-size:17px;font-weight:400;width:33px;height:33px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--fg)}
.wday.is-today .wday-n{background:var(--red);color:#fff;font-weight:700}
.wday.is-sel:not(.is-today) .wday-n{background:var(--sep);font-weight:600;background:rgba(0,122,255,.12);color:var(--blue)}
.wday-dot{width:5px;height:5px;border-radius:50%;background:var(--sub);opacity:.4}

/* ══════════════════════════════════════
   SECTIONS
══════════════════════════════════════ */
.sec{padding:14px 20px 7px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:13px;color:var(--sub)}
.sec-t b{color:var(--fg);font-weight:600}
.sec-act{border:none;background:transparent;color:var(--red);font-family:inherit;
  font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px}

/* ══════════════════════════════════════
   CARDS + ROWS
══════════════════════════════════════ */
.card{background:var(--card);border-radius:14px;margin:0 16px;overflow:hidden;
  box-shadow:0 1px 0 var(--shadow)}
.irow{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:.5px solid var(--sep);cursor:pointer;
  transition:background .1s;position:relative;overflow:hidden;
  background:var(--card);touch-action:pan-y;}
.irow:last-child{border-bottom:none}
.irow:active{background:var(--sep)}
/* Swipe backgrounds */
.irow .swipe-bg-l,.irow .swipe-bg-r{position:absolute;top:0;bottom:0;width:100%;
  display:flex;align-items:center;padding:0 22px;font-size:13px;font-weight:700;
  color:#fff;pointer-events:none;opacity:0;transition:opacity .12s}
.irow .swipe-bg-r{background:var(--green);justify-content:flex-start;left:0}
.irow .swipe-bg-l{background:var(--red);justify-content:flex-end;right:0}

/* ══════════════════════════════════════
   CHECKBOXES + COMPLETION ANIMATION
══════════════════════════════════════ */
@keyframes checkBounce{0%{transform:scale(1)}35%{transform:scale(1.35)}65%{transform:scale(.88)}100%{transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--chk);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .2s,border-color .2s;background:transparent}
.chk.done{background:var(--blue);border-color:var(--blue);animation:checkBounce .35s ease}
.chk.done::after{content:'';width:5px;height:9px;border:2px solid #fff;
  border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);
  animation:checkPop .25s ease}

/* ══════════════════════════════════════
   ROW BODY
══════════════════════════════════════ */
.ibody{flex:1;min-width:0;position:relative;z-index:1}
.ititle{font-size:15px;font-weight:400;line-height:1.35;color:var(--fg);transition:color .2s}
.ititle.done{color:var(--sub);text-decoration:line-through}
.inotes{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.imeta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;align-items:center}
.idate{font-size:12px;color:var(--sub)}
.idate.late{color:var(--red)}
.idate.today-c{color:var(--blue)}
/* drag handle only in Entrada */
.drag-handle{width:18px;color:var(--chk);cursor:grab;flex-shrink:0;
  font-size:14px;text-align:center;opacity:.4;touch-action:none;padding-right:2px}
.drag-handle:active{cursor:grabbing;opacity:.9}
.dragging{opacity:.35}
.drag-over{border-top:2px solid var(--blue)}

/* ══════════════════════════════════════
   TAGS
══════════════════════════════════════ */
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;
  display:inline-flex;align-items:center;gap:3px}
.tag-sel-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px}
.tag-opt{font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--sep);cursor:pointer;transition:all .15s;
  background:transparent;color:var(--fg);font-family:inherit}
.tag-opt.on{color:#fff;border-color:transparent}

/* ══════════════════════════════════════
   SUB-PROGRESS
══════════════════════════════════════ */
.sub-prog{height:3px;background:var(--sep);border-radius:2px;margin-top:5px;overflow:hidden}
.sub-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease}

/* ══════════════════════════════════════
   ADD ROW
══════════════════════════════════════ */
.add-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;
  color:var(--blue);font-size:15px;transition:background .1s}
.add-row:active{background:var(--sep)}
.add-card{background:var(--card);border-radius:14px;margin:8px 16px 0;overflow:hidden;
  border:none;width:calc(100% - 32px);text-align:left;font-family:inherit;display:block;
  box-shadow:0 1px 0 var(--shadow)}

/* ══════════════════════════════════════
   EMPTY STATES
══════════════════════════════════════ */
.empty-state{text-align:center;padding:40px 30px 20px;color:var(--sub)}
.empty-state .ei{font-size:44px;margin-bottom:10px;display:block}
.empty-state .et{font-size:16px;font-weight:600;color:var(--fg);margin-bottom:4px}
.empty-state .es{font-size:14px;color:var(--sub);line-height:1.5}

/* ══════════════════════════════════════
   PROJECT CARD
══════════════════════════════════════ */
.proj-card{background:var(--card);border-radius:14px;margin:0 16px;overflow:hidden;
  cursor:pointer;box-shadow:0 1px 0 var(--shadow)}
.proj-hdr{padding:13px 14px 8px;display:flex;align-items:flex-start;gap:10px}
.proj-dot{width:12px;height:12px;border-radius:50%;margin-top:3px;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:16px;font-weight:600;color:var(--fg)}
.proj-desc{font-size:13px;color:var(--sub);margin-top:1px}
.proj-foot{padding:0 14px 12px}
.prog-bar{height:4px;background:var(--sep);border-radius:2px;overflow:hidden;margin-bottom:5px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub)}

/* ══════════════════════════════════════
   DATE SHORTCUTS
══════════════════════════════════════ */
.dshort{display:flex;gap:7px;padding:10px 14px 4px;flex-wrap:wrap}
.ds-btn{border:none;background:rgba(0,122,255,.1);color:var(--blue);
  font-family:inherit;font-size:13px;font-weight:600;padding:5px 12px;
  border-radius:20px;cursor:pointer;transition:all .14s}
.ds-btn:active{background:rgba(0,122,255,.22)}

/* ══════════════════════════════════════
   NAV — PILL + FAB (Apple Music style)
══════════════════════════════════════ */
#nav-out{
  position:fixed;bottom:0;left:0;right:0;z-index:900;
  display:flex;align-items:flex-end;gap:8px;
  padding:0 10px calc(var(--sb)+16px) 12px;
  padding-top:26px;
  pointer-events:none;
  background:linear-gradient(to top,var(--bg) 0%,rgba(0,0,0,0) 100%);
}
#nav-pill{
  flex:1;min-width:0;display:flex;align-items:center;
  overflow-x:auto;scrollbar-width:none;padding:3px;
  border-radius:26px;
  background:var(--nav-bg);
  backdrop-filter:blur(50px) saturate(2);
  -webkit-backdrop-filter:blur(50px) saturate(2);
  border:.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 0 rgba(255,255,255,.7) inset,0 8px 28px var(--shadow),0 1px 3px var(--shadow);
  pointer-events:all;position:relative;
  scroll-snap-type:x mandatory;
}
[data-dark="1"] #nav-pill{
  border-color:rgba(255,255,255,.15);
  box-shadow:0 1px 0 rgba(255,255,255,.1) inset,0 8px 28px rgba(0,0,0,.4);
}
#nav-pill::-webkit-scrollbar{display:none}
#nav-pill::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:44%;
  background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,transparent 100%);
  border-radius:0 0 50% 50%;pointer-events:none;z-index:0;
}
.nb{
  flex:0 0 auto;height:54px;min-width:60px;border:none;background:transparent;
  cursor:pointer;border-radius:22px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;position:relative;z-index:1;
  transition:background .18s;scroll-snap-align:start;padding:0 10px;
}
.nb.on{background:var(--nav-active);
  box-shadow:0 1px 0 rgba(255,255,255,.85) inset,0 2px 8px var(--shadow)}
.nb svg{width:24px;height:24px}
.nb span{font-size:10px;font-weight:600;white-space:nowrap}
.nb:not(.on) svg,.nb:not(.on) span{color:var(--sub)}
.nb.on svg,.nb.on span{color:var(--fg)}
/* Badge */
.nb-badge{position:absolute;top:6px;right:6px;min-width:16px;height:16px;
  border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;
  display:none;align-items:center;justify-content:center;padding:0 3px;
  border:1.5px solid var(--bg)}
.nb-badge.on{display:flex}
/* FAB */
#nav-add{
  flex-shrink:0;height:54px;width:54px;border:none;cursor:pointer;border-radius:50%;
  background:var(--nav-bg);
  backdrop-filter:blur(50px) saturate(2);
  -webkit-backdrop-filter:blur(50px) saturate(2);
  border:.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 0 rgba(255,255,255,.7) inset,0 6px 22px var(--shadow);
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;transition:transform .15s,background .18s;
}
[data-dark="1"] #nav-add{border-color:rgba(255,255,255,.15)}
#nav-add:active{transform:scale(.88)}
#nav-add svg{width:22px;height:22px;color:var(--fg)}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
#modal-bg{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.35);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center}
#modal-bg.on{display:flex}
#modal-box{width:100%;max-width:600px;max-height:93vh;overflow-y:auto;
  background:var(--bg);border-radius:22px 22px 0 0;
  padding:0 0 calc(var(--sb)+20px);
  animation:sheetUp .28s cubic-bezier(.25,1,.5,1)}
@keyframes sheetUp{from{transform:translateY(100%);opacity:.6}to{transform:translateY(0);opacity:1}}
.mhandle{width:38px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 12px}
.msec{background:var(--card);border-radius:14px;margin:0 16px 10px;overflow:hidden}
.mrow{padding:12px 16px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;gap:10px}
.mrow:last-child{border-bottom:none}
.mlbl{font-size:15px;color:var(--sub);min-width:88px;flex-shrink:0}
.minp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;
  color:var(--fg);outline:none;text-align:right}
.minp::placeholder{color:var(--chk)}
.msel{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;
  color:var(--blue);outline:none;text-align:right;-webkit-appearance:none;cursor:pointer}
.mtitle{width:100%;border:none;background:transparent;font-family:inherit;font-size:22px;
  font-weight:600;color:var(--fg);outline:none;padding:12px 16px 6px}
.mtitle::placeholder{color:var(--chk)}
.mta{width:100%;border:none;background:transparent;font-family:inherit;font-size:15px;
  color:var(--fg);outline:none;min-height:72px;resize:none;padding:10px 16px;line-height:1.6}
.mta::placeholder{color:var(--chk)}
.mact{width:100%;padding:14px;border:none;cursor:pointer;font-family:inherit;font-size:17px;
  font-weight:400;background:transparent;color:var(--blue);display:block}
.mact.pri{font-weight:600}.mact.del{color:var(--red)}.mact:active{opacity:.55}
/* Priority selector */
.pri-row{display:flex;gap:8px;padding:10px 14px}
.pri-btn{flex:1;padding:7px 4px;border-radius:10px;border:1.5px solid var(--line);
  background:transparent;font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:center;color:var(--fg)}
.pri-btn.on{border-color:transparent;color:#fff}
/* Sub-tasks in modal */
.sub-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  border-bottom:.5px solid var(--sep)}
.sub-item:last-of-type{border-bottom:none}
.sub-add-row{display:flex;align-items:center;gap:8px;padding:9px 14px;
  border-top:.5px solid var(--sep)}
.sub-inp{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;
  color:var(--fg);outline:none}
.sub-inp::placeholder{color:var(--chk)}
/* Attach */
.attach-list{display:flex;flex-wrap:wrap;gap:6px;padding:4px 14px 10px}
.attach-chip{background:var(--sep);border-radius:8px;padding:5px 10px;font-size:12px;
  color:var(--sub);display:flex;align-items:center;gap:5px;cursor:pointer}

/* ══════════════════════════════════════
   FULL-PAGE EDITORS
══════════════════════════════════════ */
.fp{position:fixed;inset:0;z-index:850;background:var(--bg);display:none;flex-direction:column}
.fp.on{display:flex;animation:sheetUp .26s cubic-bezier(.25,1,.5,1)}
.fp-hdr{display:flex;align-items:center;
  padding:calc(var(--st)+12px) 16px 11px;
  border-bottom:.5px solid var(--line);flex-shrink:0;gap:8px}
.fp-back{border:none;background:transparent;color:var(--blue);font-family:inherit;
  font-size:17px;cursor:pointer;display:flex;align-items:center;gap:3px}
.fp-title2{flex:1;text-align:center;font-size:17px;font-weight:600;color:var(--fg)}
.fp-save{margin-left:auto;border:none;background:transparent;color:var(--blue);
  font-family:inherit;font-weight:600;font-size:17px;cursor:pointer}
.fp-scroll{flex:1;overflow-y:auto;padding-bottom:30px;-webkit-overflow-scrolling:touch}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast{position:fixed;bottom:calc(var(--sb)+118px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(0,0,0,.8);color:#fff;padding:9px 20px;border-radius:20px;
  font-size:14px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;
  z-index:9998;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
[data-dark="1"] #toast{background:rgba(255,255,255,.18);backdrop-filter:blur(20px)}

/* ══════════════════════════════════════
   NOTIFICATION BANNER
══════════════════════════════════════ */
#notif-bar{position:fixed;top:calc(var(--st)+10px);left:14px;right:14px;z-index:9999;
  background:var(--card);border-radius:16px;padding:12px 14px;
  box-shadow:0 4px 28px rgba(0,0,0,.18);display:none;align-items:center;gap:10px;
  border-left:4px solid var(--blue);animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
#notif-bar.on{display:flex}

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
#search{position:fixed;inset:0;z-index:870;background:var(--bg);
  backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);
  display:none;flex-direction:column;padding:calc(var(--st)+10px) 16px 0;
  padding-bottom:calc(var(--sb)+100px)}
#search.on{display:flex;animation:fadeIn .18s ease}
.s-bar{display:flex;align-items:center;gap:9px;background:var(--card2);
  border-radius:12px;padding:10px 13px;margin-bottom:12px}
#s-inp{flex:1;border:none;background:transparent;outline:none;font-family:inherit;
  font-size:16px;color:var(--fg)}
#s-inp::placeholder{color:var(--chk)}
#s-cancel{border:none;background:transparent;color:var(--blue);
  font-family:inherit;font-size:16px;cursor:pointer;flex-shrink:0}
.s-filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:0 0 10px;flex-shrink:0}
.s-filter-row::-webkit-scrollbar{display:none}
.sf-chip{padding:4px 12px;border-radius:16px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;white-space:nowrap;
  flex-shrink:0;transition:all .13s}
.sf-chip.on{background:var(--fg);color:var(--bg)}
.sf-chip:not(.on){background:var(--sep);color:var(--sub)}
#s-res{flex:1;overflow-y:auto}

/* ══════════════════════════════════════
   CHIPS (filter)
══════════════════════════════════════ */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 16px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;white-space:nowrap;transition:all .13s;
  flex-shrink:0;font-weight:500}
.chip.on{background:var(--fg);color:var(--bg)}
.chip:not(.on){background:var(--sep);color:var(--sub)}

/* ══════════════════════════════════════
   MINI CALENDAR
══════════════════════════════════════ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 14px;gap:1px}
.cal-wd{text-align:center;font-size:11px;color:var(--sub);padding:3px 0;font-weight:500}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:8px;cursor:pointer;gap:2px;transition:background .12s}
.cal-cell:active{background:var(--sep)}
.cal-num{font-size:15px;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--fg)}
.cal-cell.is-today .cal-num{background:var(--red);color:#fff;font-weight:700}
.cal-cell.is-sel:not(.is-today) .cal-num{background:var(--sep);font-weight:600}

/* ══════════════════════════════════════
   BACKUP SECTION
══════════════════════════════════════ */
.backup-row{display:flex;align-items:center;gap:10px;padding:13px 16px;
  border-bottom:.5px solid var(--sep);cursor:pointer}
.backup-row:last-child{border-bottom:none}
.backup-row:active{background:var(--sep)}
</style>
</head>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ╔══════════════════════════════════════╗
//  DATA MODEL
// ╚══════════════════════════════════════╝
var D={tasks:[],reminders:[],events:[],notes:[],projects:[]};
var S={
  page:'inicio',prevPage:'inicio',weekOff:0,selDate:td0(),
  calY:new Date().getFullYear(),calM:new Date().getMonth(),calSel:td0(),
  calView:false,taskF:'todas',overdueOpen:true,
  eTask:null,eRem:null,eEv:null,searchTag:null
};
var PAGE_ORDER=['inicio','hoje','entrada','projetos','notas','navegar'];
var WSHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var WLONG=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
var MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var PROJ_COLORS=['#007AFF','#34C759','#FF9500','#AF52DE','#FF3B30','#5AC8FA','#FF2D55','#FFCC00'];
var TAG_PRESETS=[
  {name:'Trabalho',color:'#007AFF'},{name:'Pessoal',color:'#34C759'},
  {name:'Compras',color:'#FF9500'},{name:'Saúde',color:'#FF3B30'},
  {name:'Estudo',color:'#AF52DE'},{name:'Casa',color:'#5AC8FA'},
  {name:'Financeiro',color:'#FFCC00'}
];
// Editor state
var _ped={id:null,color:PROJ_COLORS[0],tasks:[]};
var _ned={id:null,attach:[]};
var _curT=null; // current task being edited
var _notifIds=[];

// ╔══════════════════════════════════════╗
//  UTILS
// ╚══════════════════════════════════════╝
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function td0(){return iso(new Date())}
function iso(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function fmtD(ds){if(!ds)return'';var x=ds.split('-');return x[2]+' '+MS[+x[1]-1]}
function fmtDFull(ds){if(!ds)return'';var x=ds.split('-');return x[2]+' de '+MONTHS[+x[1]-1]+' de '+x[0]}
function isLate(d){return d&&d<td0()}
function isToday(d){return d===td0()}
function isTom(d){var x=new Date();x.setDate(x.getDate()+1);return d===iso(x)}
function addDays(ds,n){var d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return iso(d)}
function weekStart(off){var d=new Date(),dow=d.getDay(),m=new Date(d);m.setDate(d.getDate()-((dow+6)%7)+off*7);m.setHours(0,0,0,0);return m}
function tagColor(name){var t=TAG_PRESETS.find(function(x){return x.name===name});return t?t.color:'#8E8E93'}
function haiku(v){return navigator.vibrate&&navigator.vibrate(v)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ╔══════════════════════════════════════╗
//  STORAGE + BACKUP
// ╚══════════════════════════════════════╝
function save(){try{localStorage.setItem('ff11',JSON.stringify(D));updateBadges();}catch(e){}}
function load(){try{var x=JSON.parse(localStorage.getItem('ff11')||'null');if(x){D.tasks=x.tasks||[];D.reminders=x.reminders||[];D.events=x.events||[];D.notes=x.notes||[];D.projects=x.projects||[]}}catch(e){}}
function exportBackup(){
  var blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='focusflow-'+td0()+'.json';a.click();
  URL.revokeObjectURL(url);toast('Backup exportado ✓');
}
function importBackup(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var x=JSON.parse(e.target.result);
      D.tasks=x.tasks||[];D.reminders=x.reminders||[];D.events=x.events||[];
      D.notes=x.notes||[];D.projects=x.projects||[];
      save();render(S.page);toast('Backup importado ✓');
    }catch(err){alert('Arquivo inválido');}
  };
  r.readAsText(file);
}

// ╔══════════════════════════════════════╗
//  PWA MANIFEST (safe)
// ╚══════════════════════════════════════╝
try{
  var _m={name:'FocusFlow',short_name:'FocusFlow',start_url:'.',display:'standalone',
    background_color:'#F2F2F7',theme_color:'#007AFF'};
  var _mUrl=URL.createObjectURL(new Blob([JSON.stringify(_m)],{type:'application/json'}));
  var _ml=document.createElement('link');_ml.rel='manifest';_ml.href=_mUrl;document.head.appendChild(_ml);
}catch(e){}

// ╔══════════════════════════════════════╗
//  DARK MODE
// ╚══════════════════════════════════════╝
var _dark=localStorage.getItem('ff-dark');
if(_dark!==null)document.documentElement.setAttribute('data-dark',_dark);
function toggleDark(){
  var cur=document.documentElement.getAttribute('data-dark');
  var isDark=(cur==='1')||(!cur&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  var next=isDark?'0':'1';
  document.documentElement.setAttribute('data-dark',next);
  localStorage.setItem('ff-dark',next);
  updateDarkIcon();
}
function updateDarkIcon(){
  var cur=document.documentElement.getAttribute('data-dark');
  var isDark=(cur==='1')||(!cur&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  var icon=document.getElementById('dark-icon');
  if(isDark)icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  else icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
}
document.getElementById('dark-btn').addEventListener('click',toggleDark);

// ╔══════════════════════════════════════╗
//  TOAST + NOTIF
// ╚══════════════════════════════════════╝
var _toastT;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(_toastT);_toastT=setTimeout(function(){el.classList.remove('on')},2200);
}
function showNotif(icon,title,body){
  document.getElementById('nb-icon').textContent=icon;
  document.getElementById('nb-title').textContent=title;
  document.getElementById('nb-body').textContent=body;
  document.getElementById('notif-bar').classList.add('on');
  if('Notification'in window&&Notification.permission==='granted')
    try{new Notification(title,{body:body})}catch(e){}
  setTimeout(closeNotif,6000);
}
function closeNotif(){document.getElementById('notif-bar').classList.remove('on')}
function scheduleNotif(title,body,at){
  if(!at)return;var ms=new Date(at)-Date.now();if(ms<0||ms>86400000*7)return;
  var id=setTimeout(function(){showNotif('🔔',title,body);haiku([30,10,30])},ms);
  _notifIds.push(id);
}
function rescheduleAll(){
  _notifIds.forEach(clearTimeout);_notifIds=[];
  D.tasks.forEach(function(t){if(t.notifyAt&&!t.done)scheduleNotif(t.title,'Tarefa',t.notifyAt)});
  D.reminders.forEach(function(r){if(r.datetime&&!r.done)scheduleNotif(r.title,'Lembrete',r.datetime)});
  D.events.forEach(function(e){if(e.notifyAt)scheduleNotif(e.title,'Evento',e.notifyAt)});
}
try{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission()}catch(e){}

// ╔══════════════════════════════════════╗
//  BADGES
// ╚══════════════════════════════════════╝
function updateBadges(){
  var late=D.tasks.filter(function(t){return !t.done&&isLate(t.dueDate)}).length;
  var todayCt=getForDate(td0()).length;
  var pending=D.tasks.filter(function(t){return !t.done}).length;
  setBadge('bdg-inicio',late);
  setBadge('bdg-hoje',todayCt);
  setBadge('bdg-entrada',pending);
}
function setBadge(id,n){
  var el=document.getElementById(id);if(!el)return;
  el.textContent=n>9?'9+':n;el.classList.toggle('on',n>0);
}

// ╔══════════════════════════════════════╗
//  NAVIGATION + PAGE TRANSITIONS
// ╚══════════════════════════════════════╝
document.querySelectorAll('.nb[data-p]').forEach(function(b){
  b.addEventListener('click',function(){
    var p=b.dataset.p;
    if(p==='navegar'){
      goPage(p);
      setTimeout(function(){
        document.getElementById('search').classList.add('on');
        document.getElementById('s-inp').focus();
      },50);
    } else goPage(p);
  });
});
document.getElementById('nav-add').addEventListener('click',openAddMenu);

function goPage(id){
  if(S.page===id)return;
  var prev=PAGE_ORDER.indexOf(S.page),next=PAGE_ORDER.indexOf(id);
  S.prevPage=S.page;S.page=id;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active','anim-r','anim-l','anim-f')});
  var el=document.getElementById('p-'+id);
  el.classList.add('active');
  if(next>prev)el.classList.add('anim-r');
  else if(next<prev)el.classList.add('anim-l');
  else el.classList.add('anim-f');
  document.querySelectorAll('.nb[data-p]').forEach(function(b){b.classList.toggle('on',b.dataset.p===id)});
  render(id);
}
function render(id){
  if(id==='inicio')renderInicio();
  else if(id==='hoje')renderHoje();
  else if(id==='entrada')renderEntrada();
  else if(id==='projetos')renderProjetos();
  else if(id==='notas')renderNotas();
  else if(id==='navegar')renderNavegar();
}

// ╔══════════════════════════════════════╗
//  MODAL
// ╚══════════════════════════════════════╝
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-bg').classList.add('on')}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');S.eTask=S.eRem=S.eEv=null;_curT=null}
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal()});

// ╔══════════════════════════════════════╗
//  ADD MENU
// ╚══════════════════════════════════════╝
function openAddMenu(){
  haiku(10);
  var items=[
    {icon:'○',label:'Tarefa',bg:'rgba(0,122,255,.1)',c:'var(--blue)',fn:"closeModal();openTaskModal()"},
    {icon:'◎',label:'Lembrete',bg:'rgba(255,149,0,.1)',c:'var(--orange)',fn:"closeModal();openReminderModal()"},
    {icon:'◈',label:'Evento',bg:'rgba(52,199,89,.1)',c:'var(--green)',fn:"closeModal();openEventModal()"},
    {icon:'⬡',label:'Projeto',bg:'rgba(175,82,222,.1)',c:'var(--purple)',fn:"closeModal();openProjEd()"},
    {icon:'≡',label:'Nota',bg:'rgba(255,59,48,.1)',c:'var(--red)',fn:"closeModal();openNoteEd()"},
  ];
  var h='<div style="padding:2px 20px 8px;font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.6px">Adicionar</div><div class="msec">';
  items.forEach(function(it){
    h+='<div class="irow" onclick="'+it.fn+'">'
      +'<div style="width:38px;height:38px;border-radius:11px;background:'+it.bg+';display:flex;align-items:center;justify-content:center;font-size:18px;color:'+it.c+';flex-shrink:0">'+it.icon+'</div>'
      +'<span style="font-size:17px">'+it.label+'</span>'
      +'<svg style="margin-left:auto;color:var(--chk)" width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>'
      +'</div>';
  });
  h+='</div><div class="msec"><button class="mact" onclick="closeModal()">Cancelar</button></div>';
  openModal(h);
}

// ╔══════════════════════════════════════╗
//  SEARCH
// ╚══════════════════════════════════════╝
var _sTag=null;
document.getElementById('s-cancel').addEventListener('click',function(){
  document.getElementById('search').classList.remove('on');
  document.getElementById('s-inp').value='';
  document.getElementById('s-res').innerHTML='';
  _sTag=null;renderSFilters();
});
function renderSFilters(){
  var el=document.getElementById('s-filters');el.innerHTML='';
  var tags=['Todos'].concat(TAG_PRESETS.map(function(t){return t.name}));
  tags.forEach(function(t){
    var b=document.createElement('button');b.className='sf-chip'+((_sTag===null&&t==='Todos')||_sTag===t?' on':'');
    b.textContent=t;b.addEventListener('click',function(){_sTag=(t==='Todos'?null:t);renderSFilters();doSearch()});
    el.appendChild(b);
  });
}
renderSFilters();
document.getElementById('s-inp').addEventListener('input',doSearch);
function doSearch(){
  var q=document.getElementById('s-inp').value.trim(),res=document.getElementById('s-res');res.innerHTML='';
  var ql=q.toLowerCase(),hits=[];
  D.tasks.forEach(function(t){
    var matchTag=!_sTag||(t.tags&&t.tags.includes(_sTag));
    if(matchTag&&(t.title+' '+(t.notes||'')).toLowerCase().includes(ql))
      hits.push({icon:'○',t:t.title,s:t.notes||'',fn:function(){closeSearch();openTaskModal(t)}});
  });
  D.reminders.forEach(function(r){
    if(!_sTag&&(r.title+' '+(r.notes||'')).toLowerCase().includes(ql))
      hits.push({icon:'◎',t:r.title,s:r.notes||'',fn:function(){closeSearch();openReminderModal(r)}});
  });
  D.events.forEach(function(e){
    if(!_sTag&&(e.title+' '+(e.desc||'')).toLowerCase().includes(ql))
      hits.push({icon:'◈',t:e.title,s:e.desc||'',fn:function(){closeSearch();openEventModal(e)}});
  });
  D.notes.forEach(function(n){
    if(!_sTag&&(n.title+' '+(n.body||'')).toLowerCase().includes(ql))
      hits.push({icon:'≡',t:n.title,s:n.body||'',fn:function(){closeSearch();openNoteEd(n)}});
  });
  D.projects.forEach(function(p){
    if(!_sTag&&(p.title+' '+(p.notes||'')).toLowerCase().includes(ql))
      hits.push({icon:'⬡',t:p.title,s:p.notes||'',fn:function(){closeSearch();openProjEd(p)}});
  });
  if(!hits.length){res.innerHTML='<div class="empty-state"><span class="ei">🔍</span><div class="et">Sem resultados</div></div>';return}
  var c=document.createElement('div');c.className='card';c.style.margin='0 16px';
  hits.forEach(function(h){
    var r=document.createElement('div');r.className='irow';
    r.innerHTML='<span style="color:var(--sub);width:22px;text-align:center;flex-shrink:0;font-size:14px">'+h.icon+'</span><div class="ibody"><div class="ititle">'+esc(h.t)+'</div>'+(h.s?'<div class="inotes" style="-webkit-line-clamp:2">'+esc(h.s.slice(0,80))+'</div>':'')+'</div>';
    r.addEventListener('click',h.fn);c.appendChild(r);
  });
  res.appendChild(c);
}
function closeSearch(){document.getElementById('search').classList.remove('on')}

document.getElementById('w-prev').addEventListener('click',function(){S.weekOff--;renderInicio()});
document.getElementById('w-next').addEventListener('click',function(){S.weekOff++;renderInicio()});
function renderWeek(){
  var ws=weekStart(S.weekOff),t=td0(),el=document.getElementById('wdays');el.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(ws.getDate()+i);var ds=iso(d);
    var isT=ds===t,isSel=ds===S.selDate,has=getForDate(ds).length>0;
    var div=document.createElement('div');
    div.className='wday'+(isT?' is-today':'')+(isSel&&!isT?' is-sel':'');
    div.innerHTML='<div class="wday-l">'+WSHORT[d.getDay()].slice(0,3)+'</div>'
      +'<div class="wday-n">'+d.getDate()+'</div>'
      +(has?'<div class="wday-dot"></div>':'<div style="height:5px"></div>');
    div.addEventListener('click',(function(ds2){return function(){S.selDate=ds2;S.calView=false;renderInicio()}})(ds));
    el.appendChild(div);
  }
}

// ╔══════════════════════════════════════╗
//  DATA QUERIES
// ╚══════════════════════════════════════╝
function getForDate(ds){
  var a=[];
  D.tasks.forEach(function(t){if(t.dueDate===ds&&!t.done)a.push({kind:'task',data:t,date:ds})});
  D.reminders.forEach(function(r){if(r.datetime&&r.datetime.slice(0,10)===ds&&!r.done)a.push({kind:'rem',data:r,date:ds})});
  D.events.forEach(function(e){if(e.date===ds)a.push({kind:'ev',data:e,date:ds})});
  D.projects.forEach(function(p){(p.tasks||[]).forEach(function(pt){if(pt.dueDate===ds&&!pt.done)a.push({kind:'ptask',data:pt,proj:p,date:ds})})});
  return a;
}
function getAllUpcoming(){
  var a=[];
  D.tasks.forEach(function(x){if(x.dueDate&&!x.done)a.push({kind:'task',data:x,date:x.dueDate})});
  D.reminders.forEach(function(x){if(x.datetime&&!x.done)a.push({kind:'rem',data:x,date:x.datetime.slice(0,10)})});
  D.events.forEach(function(x){if(x.date)a.push({kind:'ev',data:x,date:x.date})});
  D.projects.forEach(function(p){(p.tasks||[]).forEach(function(pt){if(pt.dueDate&&!pt.done)a.push({kind:'ptask',data:pt,proj:p,date:pt.dueDate})})});
  return a;
}

// ╔══════════════════════════════════════╗
//  RECURRENCE
// ╚══════════════════════════════════════╝
function handleRecurrence(task){
  if(!task.recurrence||task.recurrence==='none'||!task.dueDate)return;
  var d=new Date(task.dueDate+'T12:00'),next=new Date(d);
  if(task.recurrence==='daily')next.setDate(d.getDate()+1);
  else if(task.recurrence==='weekly')next.setDate(d.getDate()+7);
  else if(task.recurrence==='monthly')next.setMonth(d.getMonth()+1);
  else if(task.recurrence==='yearly')next.setFullYear(d.getFullYear()+1);
  var t2=Object.assign({},task,{id:uid(),done:false,dueDate:iso(next),createdAt:new Date().toISOString()});
  D.tasks.unshift(t2);
}

// ╔══════════════════════════════════════╗
//  SWIPE TO COMPLETE / DELETE
// ╚══════════════════════════════════════╝
function addSwipe(el,onDone,onDel){
  var sx,sy,dx=0,active=false;
  var THR=72;
  el.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;active=true;
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(!active)return;
    dx=e.touches[0].clientX-sx;
    var dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)+6){active=false;el.style.transform='';return}
    e.preventDefault();
    var pct=Math.min(Math.abs(dx)/THR,1);
    el.style.transform='translateX('+dx+'px)';
    var bgR=el.querySelector('.swipe-bg-r'),bgL=el.querySelector('.swipe-bg-l');
    if(bgR)bgR.style.opacity=dx>0?pct:0;
    if(bgL)bgL.style.opacity=dx<0?pct:0;
  },{passive:false});
  el.addEventListener('touchend',function(){
    if(!active)return;active=false;
    if(dx>THR){haiku([10,5,10]);onDone();}
    else if(dx<-THR){haiku([30]);onDel();}
    else{el.style.transform='';var bgR=el.querySelector('.swipe-bg-r'),bgL=el.querySelector('.swipe-bg-l');if(bgR)bgR.style.opacity=0;if(bgL)bgL.style.opacity=0;}
  });
}

function buildCard(items){
  var c=document.createElement('div');c.className='card';
  items.forEach(function(it){c.appendChild(buildRow(it,false))});
  return c;
}
function buildRow(item,showDrag){
  showDrag=!!showDrag;
  var div=document.createElement('div');div.className='irow';
  var bgR='<div class="swipe-bg-r">✓ Concluir</div>';
  var bgL='<div class="swipe-bg-l">🗑 Excluir</div>';
  var dragEl=showDrag?'<div class="drag-handle" draggable="true">⠿</div>':'';

  if(item.kind==='task'){
    var t=item.data,late=!t.done&&isLate(t.dueDate);
    var done2=(t.subtasks||[]).filter(function(s){return s.done}).length,tot=(t.subtasks||[]).length;
    var pct=tot>0?Math.round(done2/tot*100):0;
    var tagsHtml='';
    (t.tags||[]).forEach(function(tg){tagsHtml+='<span class="tag" style="background:'+tagColor(tg)+'22;color:'+tagColor(tg)+'">'+esc(tg)+'</span>'});
    div.innerHTML=bgR+bgL
      +dragEl
      +'<div class="chk'+(t.done?' done':'')+'"></div>'
      +'<div class="ibody">'
        +'<div class="ititle'+(t.done?' done':'')+'">'+esc(t.title)+'</div>'
        +(t.notes?'<div class="inotes">'+esc(t.notes)+'</div>':'')
        +(tot>0?'<div class="sub-prog"><div class="sub-fill" style="width:'+pct+'%"></div></div>':'')
        +'<div class="imeta">'
          +(t.dueDate&&!isToday(t.dueDate)?'<span class="idate'+(late?' late':isTom(t.dueDate)?' today-c':'')+'">'+(late?'⚠ ':'')+fmtD(t.dueDate)+(t.dueTime?' · '+t.dueTime:'')+'</span>':'')
          +(t.dueDate&&isToday(t.dueDate)&&t.dueTime?'<span class="idate today-c">Hoje · '+t.dueTime+'</span>':'')
          +(tot>0?'<span class="idate">'+done2+'/'+tot+'</span>':'')
          +(t.notifyAt?'<span class="idate">🔔</span>':'')
          +(t.attachments&&t.attachments.length?'<span class="idate">📎'+t.attachments.length+'</span>':'')
          +tagsHtml
        +'</div>'
      +'</div>';
    div.querySelector('.chk').addEventListener('click',function(e){
      e.stopPropagation();haiku(12);t.done=!t.done;
      if(t.done)handleRecurrence(t);
      save();render(S.page);
    });
    div.querySelector('.ibody').addEventListener('click',function(){openTaskModal(t)});
    addSwipe(div,function(){t.done=true;if(t.recurrence&&t.recurrence!=='none')handleRecurrence(t);save();render(S.page)},function(){
      if(confirm('Excluir "'+t.title+'"?')){D.tasks=D.tasks.filter(function(x){return x.id!==t.id});save();render(S.page)}
      else{div.style.transform='';var bgLEl=div.querySelector('.swipe-bg-l');if(bgLEl)bgLEl.style.opacity=0;}
    });
  } else if(item.kind==='rem'){
    var r=item.data,late2=r.datetime&&r.datetime.slice(0,10)<td0()&&!r.done,dt=r.datetime?r.datetime.slice(11,16):'';
    div.innerHTML=bgR+bgL
      +'<div class="chk'+(r.done?' done':'')+'"></div>'
      +'<div class="ibody">'
        +'<div class="ititle'+(r.done?' done':'')+'">'+esc(r.title)+'</div>'
        +(r.notes?'<div class="inotes">'+esc(r.notes)+'</div>':'')
        +'<div class="imeta">'+(dt?'<span class="idate'+(late2?' late':'')+'">◎ '+dt+'</span>':'')+'</div>'
      +'</div>';
    div.querySelector('.chk').addEventListener('click',function(e){e.stopPropagation();haiku(12);r.done=!r.done;save();render(S.page)});
    div.querySelector('.ibody').addEventListener('click',function(){openReminderModal(r)});
    addSwipe(div,function(){r.done=true;save();render(S.page)},function(){if(confirm('Excluir?')){D.reminders=D.reminders.filter(function(x){return x.id!==r.id});save();render(S.page)}});
  } else if(item.kind==='ev'){
    var ev=item.data;
    div.innerHTML='<div style="width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border-radius:50%;background:var(--green)"></div></div>'
      +'<div class="ibody">'
        +'<div class="ititle">'+esc(ev.title)+'</div>'
        +(ev.desc?'<div class="inotes">'+esc(ev.desc)+'</div>':'')
        +'<div class="imeta">'+(ev.time?'<span class="idate">🕐 '+ev.time+(ev.endTime?' — '+ev.endTime:'')+'</span>':'')+(ev.location?'<span class="idate">📍 '+esc(ev.location)+'</span>':'')+'</div>'
      +'</div>';
    div.addEventListener('click',function(){openEventModal(ev)});
  } else if(item.kind==='ptask'){
    var pt=item.data,proj=item.proj;
    div.innerHTML=bgR+bgL
      +'<div class="chk'+(pt.done?' done':'')+'"></div>'
      +'<div class="ibody">'
        +'<div class="ititle'+(pt.done?' done':'')+'">'+esc(pt.title)+'</div>'
        +'<div class="imeta"><span style="font-size:11px;font-weight:600;color:'+(proj.color||'var(--blue)')+'">● '+esc(proj.title)+'</span>'+(pt.dueDate?'<span class="idate">'+fmtD(pt.dueDate)+'</span>':'')+'</div>'
      +'</div>';
    div.querySelector('.chk').addEventListener('click',function(e){e.stopPropagation();haiku(12);pt.done=!pt.done;save();render(S.page)});
    div.querySelector('.ibody').addEventListener('click',function(){openProjEd(proj)});
    addSwipe(div,function(){pt.done=true;save();render(S.page)},function(){if(confirm('Excluir?')){proj.tasks=proj.tasks.filter(function(x){return x.id!==pt.id});save();render(S.page)}});
  }
  return div;
}

function addSec(parent,left,right){
  var s=document.createElement('div');s.className='sec';
  s.innerHTML='<div class="sec-t">'+left+'</div>'+(right||'');parent.appendChild(s);
}

document.getElementById('cal-btn').addEventListener('click',function(){S.calView=!S.calView;renderInicio()});
function renderInicio(){
  var now=new Date();
  document.getElementById('hdr-dt').textContent=fmtD(td0())+' · '+WLONG[now.getDay()];
  document.getElementById('hoje-sub').textContent=fmtD(td0())+' · '+WSHORT[now.getDay()];
  renderWeek();
  var el=document.getElementById('inicio-feed');el.innerHTML='';
  if(S.calView){renderMiniCal(el);return}

  var t=td0(),all=getAllUpcoming(),overdue=[],upcoming=[];
  all.forEach(function(x){x.date<t?overdue.push(x):upcoming.push(x)});
  upcoming.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0});

  // Atrasados
  if(overdue.length){
    var sec=document.createElement('div');sec.className='sec';
    sec.innerHTML='<div class="sec-t"><b>Atrasados</b> <span style="color:var(--red);font-size:11px;background:rgba(255,59,48,.12);padding:1px 7px;border-radius:6px;font-weight:700">'+overdue.length+'</span></div>'
      +'<div style="display:flex;gap:7px;align-items:center">'
      +'<button class="sec-act" onclick="openReagendarModal()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.2"><polyline points="6 9 12 15 18 9"/></svg> Reagendar</button>'
      +'<button id="ov-tog" onclick="S.overdueOpen=!S.overdueOpen;renderInicio()" style="border:none;background:transparent;cursor:pointer;padding:2px;color:var(--sub);transition:transform .22s;transform:rotate('+(S.overdueOpen?'0':'−90deg')+')">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
      +'</button></div>';
    el.appendChild(sec);
    if(S.overdueOpen)el.appendChild(buildCard(overdue));
  }

  // Em breve — ONE big card with inline date dividers
  if(upcoming.length){
    addSec(el,'<b>Em breve</b>','');
    var bigCard=document.createElement('div');bigCard.className='card';
    var lastD='';
    upcoming.forEach(function(item){
      if(item.date!==lastD){
        lastD=item.date;
        var wd2=WSHORT[new Date(item.date+'T12:00').getDay()];
        var lbl=isToday(item.date)?'Hoje':isTom(item.date)?'Amanhã':fmtD(item.date);
        var sep=document.createElement('div');
        sep.style.cssText='padding:9px 14px 4px;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;'+(bigCard.children.length?'border-top:.5px solid var(--sep)':'');
        sep.textContent=lbl+' · '+wd2;bigCard.appendChild(sep);
      }
      bigCard.appendChild(buildRow(item));
    });
    el.appendChild(bigCard);
  }

  if(!overdue.length&&!upcoming.length)
    el.innerHTML+='<div class="empty-state"><span class="ei">🎉</span><div class="et">Tudo em dia!</div><div class="es">Nenhum item programado</div></div>';

  // Notas
  if(D.notes.length){
    addSec(el,'<b>Notas recentes</b>','<button onclick="goPage(\'notas\')" style="border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:13px;cursor:pointer">Ver tudo</button>');
    var nc=document.createElement('div');nc.className='card';
    D.notes.slice(0,5).forEach(function(n){
      var row=document.createElement('div');row.className='irow';
      row.innerHTML='<div style="width:32px;height:32px;border-radius:8px;background:rgba(255,204,0,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">📝</div>'
        +'<div class="ibody"><div class="ititle">'+esc(n.title)+'</div>'
        +(n.body?'<div class="inotes" style="-webkit-line-clamp:5">'+esc(n.body)+'</div>':'')
        +'<div class="imeta"><span class="idate">'+fmtD(n.updatedAt)+'</span>'+(n.attachments&&n.attachments.length?'<span class="idate">📎'+n.attachments.length+'</span>':'')+'</div></div>'
        +'<svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="var(--chk)" stroke-width="1.8" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>';
      row.addEventListener('click',function(){openNoteEd(n)});nc.appendChild(row);
    });
    el.appendChild(nc);
  }

  // Projetos
  if(D.projects.length){
    addSec(el,'<b>Projetos</b>','<button onclick="goPage(\'projetos\')" style="border:none;background:transparent;color:var(--blue);font-family:inherit;font-size:13px;cursor:pointer">Ver tudo</button>');
    D.projects.slice(0,3).forEach(function(p){
      var tot=(p.tasks||[]).length,dn=(p.tasks||[]).filter(function(t){return t.done}).length;
      var pct=tot>0?Math.round(dn/tot*100):0;
      var pc=document.createElement('div');pc.className='proj-card';pc.style.marginBottom='10px';
      pc.innerHTML='<div class="proj-hdr"><div class="proj-dot" style="background:'+(p.color||'var(--blue)')+'"></div>'
        +'<div class="proj-info"><div class="proj-name">'+esc(p.title)+'</div>'+(p.notes?'<div class="proj-desc">'+esc(p.notes)+'</div>':'')+'</div>'
        +'<svg width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="var(--chk)" stroke-width="1.8" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg></div>'
        +(tot>0?'<div class="proj-foot"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+(p.color||'var(--blue)')+'"></div></div><div class="prog-meta"><span>'+dn+'/'+tot+' tarefas</span><span style="font-weight:700;color:'+(p.color||'var(--blue)')+'">'+pct+'%</span></div></div>':'');
      pc.addEventListener('click',function(){openProjEd(p)});el.appendChild(pc);
    });
  }

  var ar=makeAddBtn(openAddMenu);ar.style.marginTop='8px';el.appendChild(ar);
  updateBadges();
}

function makeAddBtn(fn){
  var b=document.createElement('button');b.className='add-card';
  b.innerHTML='<div class="add-row"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>Adicionar…</div>';
  b.addEventListener('click',fn);return b;
}

function renderMiniCal(el){
  var y=S.calY,m=S.calM,t=td0();
  var nav=document.createElement('div');nav.className='cal-nav';
  nav.innerHTML='<button class="w-arr" id="cprev">‹</button><span style="font-size:16px;font-weight:700">'+MONTHS[m]+' '+y+'</span><button class="w-arr" id="cnext">›</button>';
  el.appendChild(nav);
  document.getElementById('cprev').addEventListener('click',function(){S.calM--;if(S.calM<0){S.calM=11;S.calY--}renderInicio()});
  document.getElementById('cnext').addEventListener('click',function(){S.calM++;if(S.calM>11){S.calM=0;S.calY++}renderInicio()});
  var wds=document.createElement('div');wds.className='cal-grid';
  ['D','S','T','Q','Q','S','S'].forEach(function(w){var d=document.createElement('div');d.className='cal-wd';d.textContent=w;wds.appendChild(d)});
  el.appendChild(wds);
  var g=document.createElement('div');g.className='cal-grid';
  var fd=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  for(var i=0;i<fd;i++)g.appendChild(document.createElement('div'));
  for(var d2=1;d2<=days;d2++){
    var ds=y+'-'+p2(m+1)+'-'+p2(d2);
    var isT=ds===t,isSel=ds===S.calSel,has=getForDate(ds).length>0;
    var cell=document.createElement('div');cell.className='cal-cell'+(isT?' is-today':'')+(isSel&&!isT?' is-sel':'');
    cell.innerHTML='<div class="cal-num">'+d2+'</div>'+(has?'<div class="wday-dot"></div>':'');
    cell.addEventListener('click',(function(ds2){return function(){S.calSel=ds2;S.calView=false;S.selDate=ds2;renderInicio()}})(ds));
    g.appendChild(cell);
  }
  el.appendChild(g);
  var items=getForDate(S.calSel);
  addSec(el,'<b>'+fmtDFull(S.calSel)+'</b>'+(isToday(S.calSel)?' <span style="color:var(--sub)">· Hoje</span>':''),'');
  if(items.length)el.appendChild(buildCard(items));
  else{var ep=document.createElement('div');ep.className='empty-state';ep.style.padding='18px 20px';ep.innerHTML='<div class="es">Nenhum item nesta data</div>';el.appendChild(ep)}
}

function renderHoje(){
  var el=document.getElementById('hoje-feed');el.innerHTML='';

function renderEntrada(){

  [['todas','Todas'],['pendentes','Pendentes'],['hoje','Hoje'],['atrasadas','Atrasadas'],['concluidas','Concluídas']].forEach(function(p){
    var c=document.createElement('button');c.className='chip'+(S.taskF===p[0]?' on':'');
    c.textContent=p[1];c.addEventListener('click',function(){S.taskF=p[0];renderEntrada()});chips.appendChild(c);
  });
  // Tag filter chips
  var allTags=[];
  D.tasks.forEach(function(t){(t.tags||[]).forEach(function(tg){if(!allTags.includes(tg))allTags.push(tg)})});
  if(allTags.length){
    allTags.forEach(function(tg){
      var c=document.createElement('button');c.className='chip';c.style.background='rgba(0,0,0,.06)';
      c.innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+tagColor(tg)+';margin-right:4px"></span>'+esc(tg);
      c.addEventListener('click',function(){_sTag=tg;renderSFilters();document.getElementById('search').classList.add('on');doSearch()});
      chips.appendChild(c);
    });
  }
  var el=document.getElementById('entrada-feed');el.innerHTML='';
  var tasks=filteredTasks();
  if(!tasks.length){
    el.innerHTML='<div class="empty-state"><span class="ei">📭</span><div class="et">Nenhum item</div><div class="es">Tudo limpo por aqui</div></div>';
  } else {
    var c=document.createElement('div');c.className='card';
    tasks.forEach(function(t){c.appendChild(buildRow({kind:'task',data:t,date:t.dueDate||''},true))});
    el.appendChild(c);
    enableDragReorder(c,D.tasks);
  }
  el.appendChild(makeAddBtn(openTaskModal));
}
function filteredTasks(){
  var f=S.taskF,T=D.tasks;
  if(f==='hoje')return T.filter(function(t){return isToday(t.dueDate)});
  if(f==='atrasadas')return T.filter(function(t){return !t.done&&isLate(t.dueDate)});
  if(f==='pendentes')return T.filter(function(t){return !t.done});
  if(f==='concluidas')return T.filter(function(t){return t.done});
  return T;
}

// ╔══════════════════════════════════════╗
//  DRAG-TO-REORDER
// ╚══════════════════════════════════════╝
function enableDragReorder(container,arr){
  var dragSrc=null;
  container.querySelectorAll('.irow').forEach(function(row,i){
    var handle=row.querySelector('.drag-handle');
    if(!handle)return;
    handle.setAttribute('draggable','true');
    handle.addEventListener('dragstart',function(e){
      dragSrc=row;row.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',i);
    });
    handle.addEventListener('dragend',function(){row.classList.remove('dragging');container.querySelectorAll('.irow').forEach(function(r){r.classList.remove('drag-over')})});
    row.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';container.querySelectorAll('.irow').forEach(function(r){r.classList.remove('drag-over')});row.classList.add('drag-over')});
    row.addEventListener('drop',function(e){
      e.preventDefault();row.classList.remove('drag-over');
      if(dragSrc===row)return;
      var fromI=parseInt(e.dataTransfer.getData('text/plain'));
      var rows=[].slice.call(container.querySelectorAll('.irow'));
      var toI=rows.indexOf(row);
      if(fromI<0||toI<0||fromI===toI)return;
      var item=arr.splice(fromI,1)[0];arr.splice(toI,0,item);
      save();renderEntrada();
    });
  });
}

function setDate(ds){var f=document.getElementById('t-dt');if(f)f.value=ds;_curT.dueDate=ds}

function toggleTag(name){var tags=_curT.tags||[];var i=tags.indexOf(name);if(i>=0)tags.splice(i,1);else tags.push(name);_curT.tags=tags;syncTaskFields();window._taskRender&&window._taskRender()}
function toggleSub(i){syncTaskFields();_curT.subtasks[i].done=!_curT.subtasks[i].done;window._taskRender&&window._taskRender()}
function delSub(i){syncTaskFields();_curT.subtasks.splice(i,1);window._taskRender&&window._taskRender()}
function addSub(){
  var inp=document.getElementById('sub-i'),dt=document.getElementById('sub-dt');

  syncTaskFields();
  _curT.subtasks=_curT.subtasks||[];
  _curT.subtasks.push({id:uid(),title:inp.value.trim(),done:false,dueDate:dt?dt.value:''});
  window._taskRender&&window._taskRender();
}
function addAtt(inp){syncTaskFields();for(var i=0;i<inp.files.length;i++)_curT.attachments.push(inp.files[i].name);window._taskRender&&window._taskRender()}
function delAtt(i){syncTaskFields();_curT.attachments.splice(i,1);window._taskRender&&window._taskRender()}
function syncTaskFields(){
  var ti=document.getElementById('t-ti'),no=document.getElementById('t-no'),dt=document.getElementById('t-dt'),hr=document.getElementById('t-hr'),rc=document.getElementById('t-rc'),ntf=document.getElementById('t-notif');
  if(ti)_curT.title=ti.value;if(no)_curT.notes=no.value;if(dt)_curT.dueDate=dt.value;if(hr)_curT.dueTime=hr.value;if(rc)_curT.recurrence=rc.value;if(ntf)_curT.notifyAt=ntf.value;
}
function saveTask(){
  syncTaskFields();
  if(!_curT.title||!_curT.title.trim())return;
  var obj=Object.assign({},_curT);obj.title=obj.title.trim();
  if(obj.notifyAt)scheduleNotif(obj.title,'Tarefa',obj.notifyAt);
  if(S.eTask)Object.assign(S.eTask,obj);
  else{obj.id=uid();obj.done=false;obj.createdAt=new Date().toISOString();D.tasks.unshift(obj)}
  save();closeModal();render(S.page);toast('Salvo ✓');
}
function deleteTask(){if(!S.eTask)return;D.tasks=D.tasks.filter(function(t){return t.id!==S.eTask.id});save();closeModal();render(S.page);toast('Excluído')}

// ╔══════════════════════════════════════╗

// ╚══════════════════════════════════════╝
function fmtICSDate(ds,time){
  if(!ds)return'';
  var d=ds.replace(/-/g,'');
  if(time){var t=time.replace(':','');return d+'T'+t+'00';}
  return d;
}
function exportICS(){
  if(!D.events.length&&!D.tasks.filter(function(t){return t.dueDate&&!t.done}).length){
    toast('Nenhum evento para exportar');return;
  }
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FocusFlow//PT','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  D.events.forEach(function(e){
    var uid2=uid()+'@focusflow';
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid2);
    lines.push('SUMMARY:'+e.title.replace(/\n/g,' '));
    if(e.desc)lines.push('DESCRIPTION:'+e.desc.replace(/\n/g,'\\n'));
    if(e.location)lines.push('LOCATION:'+e.location);
    if(e.date&&e.time){
      lines.push('DTSTART:'+fmtICSDate(e.date,e.time));
      lines.push('DTEND:'+fmtICSDate(e.date,e.endTime||e.time));
    } else if(e.date){
      lines.push('DTSTART;VALUE=DATE:'+e.date.replace(/-/g,''));
      var nd=addDays(e.date,1);lines.push('DTEND;VALUE=DATE:'+nd.replace(/-/g,''));
    }
    lines.push('END:VEVENT');
  });
  // Also add tasks with due dates as VTODO
  D.tasks.filter(function(t){return t.dueDate&&!t.done}).forEach(function(t){
    lines.push('BEGIN:VTODO');
    lines.push('UID:'+t.id+'@focusflow');
    lines.push('SUMMARY:'+t.title.replace(/\n/g,' '));
    if(t.notes)lines.push('DESCRIPTION:'+t.notes.replace(/\n/g,'\\n'));
    lines.push('DUE;VALUE=DATE:'+t.dueDate.replace(/-/g,''));
    lines.push('STATUS:'+(t.done?'COMPLETED':'NEEDS-ACTION'));
    lines.push('END:VTODO');
  });
  lines.push('END:VCALENDAR');
  var ics=lines.join('\r\n');
  var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='focusflow-'+td0()+'.ics';a.click();
  URL.revokeObjectURL(url);
  toast('Arquivo .ics exportado — abra no Calendário Apple ✓');
}
function importICS(file){
  var r=new FileReader();
  r.onload=function(e){
    var text=e.target.result,imported=0;
    var events=text.split('BEGIN:VEVENT');
    events.slice(1).forEach(function(block){
      var title=(block.match(/SUMMARY:(.+)/)||[])[1]||'Evento';
      var desc=(block.match(/DESCRIPTION:(.+)/)||[])[1]||'';
      var dtStart=(block.match(/DTSTART[^:]*:(\d{8})/)||[])[1]||'';
      var timeM=block.match(/DTSTART[^:]*:(\d{8})T(\d{4})/);
      var date=dtStart?dtStart.slice(0,4)+'-'+dtStart.slice(4,6)+'-'+dtStart.slice(6,8):'';
      var time=timeM?timeM[2].slice(0,2)+':'+timeM[2].slice(2,4):'';
      var loc=(block.match(/LOCATION:(.+)/)||[])[1]||'';
      if(date){D.events.push({id:uid(),title:title.trim(),desc:desc.replace(/\\n/g,'\n').trim(),date:date,time:time,endTime:'',location:loc.trim(),notifyAt:''});imported++;}
    });
    if(imported>0){save();render(S.page);toast(imported+' evento(s) importado(s) ✓');}
    else toast('Nenhum evento encontrado no arquivo');
  };
  r.readAsText(file);
}
